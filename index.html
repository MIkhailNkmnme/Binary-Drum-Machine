<!DOCTYPE html>
<!--
===========================================================================
PROJECT: Binary Drum Machine (Zerkalius: Genesis)
VERSION: Pro 33.0 (The Architect's Fix)
"We are not just moving strings, we are weaving the fabric of the Matrix."
===========================================================================
-->
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Binary Drum Machine (Zerkalius 33.0)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        @font-face {
            font-family: 'Roboto Mono Local';
            src: url('RobotoMono-Regular.ttf') format('truetype'), url('RobotoMono.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        body { 
            background: #050505; color: #00ff66; 
            font-family: 'Roboto Mono Local', 'Roboto Mono', monospace; 
            margin: 8px; overflow: hidden; height: calc(100vh - 16px);
            transition: background 0.3s;
        }

        .main-layout { display: flex; gap: 12px; height: 100%; align-items: stretch; flex-direction: row; transition: 0.3s; }
        
        .controls { 
            width: 300px; min-width: 300px; display: flex; flex-direction: column; 
            background: #101010; padding: 6px; border-radius: 4px; border: 1px solid #222; 
            box-sizing: border-box; height: 100%; transition: 0.3s;
        }

        .fixed-top { flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; border-bottom: 2px solid #222; padding-bottom: 6px; margin-bottom: 4px; }
        
        .scrollable-settings { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 2px; }
        .scrollable-settings::-webkit-scrollbar { width: 6px; }
        .scrollable-settings::-webkit-scrollbar-track { background: #111; }
        .scrollable-settings::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .fixed-player { flex-shrink: 0; background: #141414; border: 1px solid #222; border-radius: 4px; padding: 6px; display: flex; flex-direction: column; gap: 4px; margin-top: 4px; border-top: 2px solid #00ff66; }

        h3 { margin: 0 0 3px 0; color: #ffffff; text-shadow: 0 0 10px rgba(0,255,102,0.3); font-size: 14px; text-align: center; }
        
        .player-buttons { display: flex; gap: 4px; width: 100%; }
        .player-buttons button { font-size: 16px; font-family: inherit; border: none; cursor: pointer; border-radius: 3px; padding: 4px 2px; display:flex; align-items:center; justify-content:center;}
        #playBtn { flex: 2; background: #00ff66; color: #000; } #playBtn:hover { background: #00cc52; }
        #stopBtn { flex: 1.2; background: #ff3333; color: #fff; } #stopBtn:hover { background: #cc0000; }
        #prevBtn, #nextBtn { flex: 1; background: #202020; color: #fff; border: 1px solid #333; font-size: 14px; }

        .btn-export { background: #00ccff; color: #000; font-size: 11px; font-weight: bold; border: none; border-radius: 3px; padding: 5px; cursor: pointer; width: 100%; text-align: center; }
        .btn-export-excel { background: #217346; color: #fff; font-size: 11px; font-weight: bold; border: none; border-radius: 3px; padding: 5px; cursor: pointer; width: 100%; text-align: center; }
        
        .btn-zerkalius { background: #ffcc00; color: #000; font-size: 11px; font-weight: bold; padding: 6px; border: none; border-radius: 3px; cursor: pointer; margin-top: 2px; width: 100%; }
        
        .btn-mod { background: #444; color: #00ff66; border: 1px solid #00ff66; font-size: 10px; font-weight: bold; padding: 4px; border-radius: 3px; cursor: pointer; flex: 1; text-align: center; }
        .btn-mod:hover { background: #00ff66; color: #000; }
        .btn-mod.cyan { color: #00ccff; border-color: #00ccff; } .btn-mod.cyan:hover { background: #00ccff; color: #000; }
        .btn-mod.magenta { color: #ff00ff; border-color: #ff00ff; } .btn-mod.magenta:hover { background: #ff00ff; color: #000; }

        .btn-vacuum { background: #00ccff; color: #000; border: none; font-size: 11px; font-weight: bold; padding: 4px; border-radius: 3px; cursor: pointer; width: 100%; margin-top: 2px;}
        .btn-clear-canvas { background: #330000; color: #ff6666; border: 1px solid #ff6666; font-size: 11px; font-weight: bold; padding: 5px; border-radius: 3px; cursor: pointer; width: 100%; margin-bottom: 4px;}
        .btn-clear-canvas:hover { background: #ff6666; color: #000; }

        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; flex: 1; }
        .btn-file { display: block; text-align: center; background: #252525; color: #fff; border: 1px solid #3c3c3c; padding: 5px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-audio { background: #9900ff; color: #fff; border: 1px solid #cc66ff; }
        .btn-mic { background: #ff3366; color: #fff; border: 1px solid #ff6699; padding: 5px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; text-align: center;}
        .btn-mic:hover { background: #ff6699; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }

        .control-group { display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid #1a1a1a; padding-bottom: 6px; }
        .control-group-highlight { background: #141414; padding: 6px; border-radius: 3px; border: 1px solid #222; }
        .control-group-blue { background: #0a1128; padding: 6px; border-radius: 3px; border: 1px solid #1a2a50; }
        .control-group-gold { background: #1a1a00; padding: 6px; border-radius: 3px; border: 1px solid #ffcc00; }
        .control-group:last-of-type { border-bottom: none; }

        label { font-size: 11px; display: flex; justify-content: space-between; align-items: center; user-select: none; color: #888; }
        .compact-row { display: flex; gap: 4px; justify-content: space-between; align-items: center; }
        .checkbox-row { display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin-bottom: 2px; cursor: pointer; }
        .checkbox-row span { color: #aaa; font-weight: normal; font-size: 11px; }
        .checkbox-row:hover span { color: #fff; }

        input[type="range"] { width: 100%; cursor: pointer; margin-top: 1px; }
        input[type="text"], input[type="number"] { background: #151515; color: #fff; border: 1px solid #333; padding: 4px; border-radius: 3px; font-family: inherit; font-size: 11px; outline: none; width: 100%; box-sizing: border-box; }
        input[type="color"] { border: none; width: 28px; height: 16px; padding: 0; background: none; cursor: pointer; }
        select { background: #222; color: #fff; border: 1px solid #444; padding: 3px; border-radius: 3px; width: 100%; font-family: inherit; font-size: 11px; outline: none; cursor: pointer;}
        
        #statusInfo { font-size: 10px; color: #ffcc00; text-align: center; margin-top: 1px; min-height: 11px; }
        #screenContainer { flex-grow: 1; background: #000000; border: 2px solid #111; border-radius: 5px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        #screenCanvas { display: block; cursor: grab; } 
        #screenCanvas:active { cursor: grabbing; }
        
        /* ПЛАВАЮЩИЕ КНОПКИ */
        .float-btn { position: absolute; z-index: 10; border: none; cursor: pointer; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: opacity 0.3s, background 0.2s, box-shadow 0.2s; left: 8px;}
        #toggleMenuBtn { top: 8px; background: #00ff66; color: #000; box-shadow: 0 0 8px rgba(0, 255, 102, 0.5); border-radius: 3px; height: 26px; width: 34px;}
        #toggleSideBtn { top: 40px; background: #00ccff; color: #000; box-shadow: 0 0 8px rgba(0, 204, 255, 0.5); border-radius: 3px; height: 26px; width: 34px;}
        
        #toggleCenterBtn { top: 50%; transform: translateY(-120px); background: #333; color: #fff; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        #toggleTrackBtn { top: 50%; transform: translateY(-70px); background: #333; color: #fff; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        #toggleReverseBtn { top: 50%; transform: translateY(-20px); background: #333; color: #fff; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        #toggleFrameBtn { top: 50%; transform: translateY(30px); background: #ffcc00; color: #000; box-shadow: 0 0 8px rgba(255, 204, 0, 0.5); }
        #toggleRadarBtn { top: 50%; transform: translateY(80px); background: #cc33ff; color: #fff; box-shadow: 0 0 10px rgba(204, 51, 255, 0.6); border-radius: 8px; }

        .align-btn { right: 8px; left: auto; background: #0a1128; color: #00ccff; border: 1px solid #1a2a50; border-radius: 4px; height: 28px; width: 34px;}
        #alignLeftBtn { top: 8px; }
        #alignCenterBtn { top: 40px; background: #00ccff; color: #000; box-shadow: 0 0 8px rgba(0, 204, 255, 0.5); }
        #alignRightBtn { top: 72px; }

        .color-palette { display: flex; flex-direction: column; gap: 2px; background: #1a1a1a; padding: 4px; border-radius: 3px; margin-top: 2px; }
        .palette-row { display: flex; gap: 4px; align-items: center; justify-content: space-between; }
        .palette-row span { font-size: 9px; color: #ccc; width: 45px; }
        .palette-row input[type="range"] { margin: 0; }
        
        textarea { 
            background: #050505; color: #ffcc00; border: 1px solid #ffcc00; 
            font-family: inherit; font-size: 10px; width: 100%; height: 60px; 
            margin-top: 4px; border-radius: 3px; resize: none; display: none; 
            padding: 4px; box-sizing: border-box; box-shadow: inset 0 0 5px rgba(255,204,0,0.2);
        }

        body.zen-mode .controls { display: none !important; }
        body.zen-mode .float-btn { opacity: 0 !important; pointer-events: none; }
        body.zen-mode .main-layout { gap: 0; }
        body.zen-mode #screenContainer { border: none; border-radius: 0; }
        body.zen-mode { margin: 0; height: 100vh; }

        @media (max-width: 950px), (max-height: 500px) and (orientation: landscape) {
            .main-layout { flex-direction: column-reverse !important; }
            .controls { width: 100% !important; min-width: 100% !important; height: 45vh !important; }
            #screenContainer { height: 55vh !important; flex-grow: unset !important; }
            .scrollable-settings { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 8px; }
            .control-group { border-bottom: none; border-right: 1px solid #222; }
            #toggleSideBtn { display: none; } 
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="controls" id="leftPanel">
            
            <div class="fixed-top">
                <h3>Binary Drum Machine (Pro 33)</h3>
                
                <button id="clearCanvasBtn" class="btn-clear-canvas">🧽 Мгновенная Очистка Холста</button>

                <div class="control-group control-group-gold" style="border-bottom: none; padding-bottom: 2px;">
                    <div class="compact-row">
                        <select id="sceneSelect" style="font-weight:bold; color:#ffcc00; flex: 2; border: 1px solid #ff9900;">
                            <option value="">📍 Карта Сокровищ (Выбрать...)</option>
                        </select>
                        <button id="saveSceneBtn" class="btn-zerkalius" style="background:#ff9900; margin: 0; flex: 1; padding: 3px;">💾 Сохр.</button>
                    </div>
                </div>

                <div class="compact-row">
                    <div class="file-input-wrapper"><span class="btn-file">📂 Текст</span><input type="file" id="fileLoader" accept=".txt"></div>
                    <div class="file-input-wrapper">
                        <span class="btn-file btn-audio" id="audioBtnText">🎵 Трек</span>
                        <input type="file" id="audioLoader" accept="audio/*">
                    </div>
                    <button id="micBtn" class="btn-mic" title="Попросит доступ к захвату окна (Выбери вкладку с системным аудио)">🎤 Звук ПК</button>
                </div>
                
                <audio id="bgAudio" loop style="display:none;"></audio>

                <div class="compact-row">
                    <button id="exportBtn" class="btn-export">💾 Сохр.</button>
                    <button id="exportExcelBtn" class="btn-export-excel">📊 в Excel</button>
                    <button id="generateVacuumBtn" class="btn-vacuum" style="margin:0;">Сетка</button>
                </div>
                <div id="statusInfo">Двойной клик по холсту — Режим Дзен</div>
            </div>

            <div class="scrollable-settings">
                
                <div class="control-group">
                    <label class="checkbox-row" style="margin-top: 2px; background: #2a0044; padding: 4px; border-radius: 3px;">
                        <input type="checkbox" id="audioReactCheck" checked>
                        <span style="color:#cc66ff; font-weight:bold;">Визуализатор Звука (Пульсация)</span>
                    </label>
                    <label class="checkbox-row" style="margin-top: 2px; background: #00331a; padding: 4px; border-radius: 3px;">
                        <input type="checkbox" id="autoPilotCheck">
                        <span style="color:#00ff88; font-weight:bold;">🤖 AI Авто-Пилот (Рандом Сцен)</span>
                    </label>
                    <label class="checkbox-row" style="margin-top: 2px; background: #2a0000; padding: 4px; border-radius: 3px;">
                        <input type="checkbox" id="echoModeCheck">
                        <span style="color:#ff6666; font-weight:bold;">Каскадное Эхо (Шлейф)</span>
                    </label>
                    <div class="compact-row" style="margin-top: 4px;">
                        <button id="insertZerosGlobalBtn" class="btn-mod">Вставить 0</button>
                        <button id="insertOnesGlobalBtn" class="btn-mod magenta">Вставить 1</button>
                        <button id="fill1010Btn" class="btn-mod cyan">Заполнить 1010</button>
                    </div>
                </div>

                <div class="control-group control-group-blue">
                    <label style="color:#00ccff; font-weight:bold;">Поиск паттерна (Логгер):</label>
                    <input type="text" id="searchInput" placeholder="Например: 11011 (Сохранит строку)" style="text-align: center; border-color: #00ccff;">
                    <textarea id="dataInput" readonly placeholder="Здесь появятся найденные строки..."></textarea>
                </div>

                <div class="control-group control-group-highlight" style="border-color: #ffcc00;">
                    <label style="color:#ffcc00; text-align:center;">Генератор Форм</label>
                    <select id="zerkRuleSelect" style="margin: 4px 0; background: #222;">
                        <option value="90">Правило 90 (Классика)</option>
                        <option value="30">Правило 30 (Хаос)</option>
                        <option value="110">Правило 110 (Правый Сдвиг)</option>
                        <option value="18">Правило 18 (Серпинский V2)</option>
                        <option value="150">Правило 150 (Инопланетная вязь)</option>
                        <option value="vortex" style="color:#00ccff; font-weight:bold;">🌌 Квантовая Воронка (Змейка 3D)</option>
                        <option value="ziggurat" style="color:#ff9900; font-weight:bold;">🛕 Зиккурат (Полосатая Воронка)</option>
                        <option value="orbital" style="color:#00ffcc; font-weight:bold; background:#003322;">🎯 Орбитальный Конус 1-0-1</option>
                        <option value="diagonal" style="color:#ff3333; font-weight:bold; background:#330000;">🕸️ Диагональная Сетка (Изометрия)</option>
                    </select>
                    <div class="compact-row">
                        <label>Сид:<input type="text" id="zerkSeedInput" value="1" style="width: 50px; text-align:center;"></label>
                        <label>Строк:<input type="number" id="zerkCountInput" value="50" style="width: 50px; text-align:center;"></label>
                    </div>
                    <label class="checkbox-row" style="margin-top: 4px;"><input type="checkbox" id="trimZerosCheck" checked><span>Обрезать фон (висеть в пустоте)</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="implantModeCheck" checked><span style="color:#00ccff; font-weight:bold;">Вживить фигуру в центр матрицы</span></label>
                    <button id="zerkaliusBtn" class="btn-zerkalius">Создать Фигуру</button>
                </div>

                <div class="control-group control-group-highlight" style="border-color: #ff00ff;">
                    <label style="color:#ff00ff; text-align:center; width: 100%;">Двойное Измерение (Dual Core)</label>
                    <label class="checkbox-row" style="margin-top:2px;"><input type="checkbox" id="dualCoreCheck"><span>Включить Наложение Слоев</span></label>
                    <label class="checkbox-row" style="margin-top:2px;"><input type="checkbox" id="dualMaskCheck"><span>Проникающая Маска (XOR линза)</span></label>
                    <label class="checkbox-row" style="margin-top:2px;"><input type="checkbox" id="freezeLayer1Check"><span style="color:#ffcc00; font-weight:bold;">⚓ Заморозить Слой 1 (Стоит на месте)</span></label>
                    <div class="compact-row" style="margin-top: 4px;">
                        <label>Множитель скорости Слой 2:</label>
                        <input type="number" id="dualCoreSpeedInput" value="2" min="1" max="10" style="width: 40px; text-align:center;">
                    </div>
                </div>

                <div class="control-group">
                    <label>Алгоритм Y-сдвига:</label>
                    <input type="text" id="algorithmInput" value="1" placeholder="например: 1, 1, 2, -3, 1" style="text-align: center;">
                    <label class="checkbox-row" style="margin-top: 4px; background: #003300; padding: 2px;"><input type="checkbox" id="freezeScrollCheck"><span style="color:#00ff66; font-weight:bold;">Заморозить Y-Скролл (Только X)</span></label>
                    <label class="checkbox-row" style="margin-top: 2px; background: #330033; padding: 2px;"><input type="checkbox" id="spin3dCheck"><span style="color:#cc33ff; font-weight:bold;">3D Вращение (Орбита Радара)</span></label>
                    <label class="checkbox-row" style="margin-top: 2px; background: #331100; padding: 2px;"><input type="checkbox" id="breathingZoomCheck"><span style="color:#ff9933; font-weight:bold;">🫁 Дыхание (Авто-Масштаб)</span></label>
                </div>

                <div class="control-group control-group-highlight">
                    <label class="checkbox-row" style="margin:0;"><input type="checkbox" id="hideStaticCheck"><span><b style="color:#ffcc00">Скрыть статику (Delta)</b></span></label>
                    <select id="deltaModeSelect" style="margin-top:4px;">
                        <option value="top">Вертикаль (▲)</option>
                        <option value="leftDiag">Лев. диагональ (↖)</option>
                        <option value="rightDiag">Прав. диагональ (↗)</option>
                        <option value="serpinski" selected>Серпинский (↖↗)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Логическая операция:</label>
                    <select id="logicalOpSelect">
                        <option value="original">Оригинал (Без изменений)</option>
                        <option value="not">Инверсия NOT (0 ⇄ 1)</option>
                        <option value="xor">Разница XOR (со сдвигом)</option>
                        <option value="reverse">Зеркало (Реверс строки)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="checkbox-row"><input type="checkbox" id="zerkaliusAnimCheck"><span><b style="color:#ff3333">Аниматрица (Волна Сверху-Вниз)</b></span></label>
                    <label class="checkbox-row"><input type="checkbox" id="elkaCheck"><span><b style="color:#00ccff">Круговой сдвиг (Ёлка)</b></span></label>
                    <label class="checkbox-row"><input type="checkbox" id="cylinderCheck"><span>Круговой сдвиг (Цилиндр)</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="findDiagonalsCheck"><span>Искать диагонали макросом</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="neonGlowCheck"><span>Свечение (Neon)</span></label>
                </div>
            </div>

            <div class="fixed-player">
                <div class="player-buttons">
                    <button id="prevBtn" title="Шаг назад">◀</button>
                    <button id="playBtn" title="Старт / Пауза">▶</button>
                    <button id="stopBtn" title="Стоп и сброс">■</button>
                    <button id="nextBtn" title="Шаг вперед">▶▶</button>
                </div>
                
                <div class="control-group" style="border: none; padding: 0;">
                    <label>Кадр: <span id="timelineVal">0 / 0</span></label>
                    <input type="range" id="timelineRange" class="timeline-slider" min="0" max="0" value="0">
                </div>

                <div class="control-group" style="border: none; padding: 0;">
                    <div class="compact-row">
                        <label style="flex:1;">Скорость (1 - 1000мс):</label>
                        <label style="color:#ff3333; font-weight:bold;">x<input type="number" id="speedMultInput" value="1" min="1" max="100" style="width:35px; margin-left:4px; text-align:center; padding:2px;"></label>
                    </div>
                    <input type="range" id="speedRange" min="1" max="1000" value="920">
                    <div class="compact-row" style="margin-top:2px;">
                        <span style="font-size:10px; color:#555;">🐌</span>
                        <span id="speedVal" style="font-size:10px; color:#00ff66;">80 мс</span>
                        <span style="font-size:10px; color:#555;">🚀</span>
                    </div>
                </div>

                <div class="control-group" style="border: none; padding: 0;">
                    <div class="compact-row">
                        <label>Масштаб: <span id="fontSizeVal">24px</span></label>
                        <label>Экран: <span id="heightVal">15</span></label>
                    </div>
                    <div class="compact-row">
                        <input type="range" id="fontSizeRange" min="1" max="100" value="24" style="flex:1;">
                        <input type="range" id="heightRange" min="1" max="1024" value="15" style="flex:1;">
                    </div>
                    
                    <div class="compact-row" style="margin-top: 4px;">
                        <label>Интервал: <span id="lineHeightVal">1.2</span></label>
                        <input type="range" id="lineHeightRange" min="0.5" max="3.0" step="0.1" value="1.2" style="flex:1; margin-left: 8px;">
                    </div>
                    
                    <div style="margin-top: 4px;">
                        <select id="fontSelect">
                            <option value="monospace">Шрифт: Моноширинный (Космос)</option>
                            <option value="'Courier New', Courier, monospace">Шрифт: Courier New (Матрица)</option>
                            <option value="'Impact', sans-serif">Шрифт: Impact (Монолит)</option>
                            <option value="'Comic Sans MS', cursive">Шрифт: Comic Sans (Хаос)</option>
                        </select>
                    </div>
                </div>

                <!-- ПАЛИТРА -->
                <div class="control-group" style="border: none; padding: 0; margin-top: 2px;">
                    <label class="checkbox-row" style="margin-bottom:4px;"><input type="checkbox" id="rainbowTextCheck"><span style="color:#ff3333; font-weight:bold;">🌈 Радужный Текст (ASCII)</span></label>
                    <select id="themeSelect" style="padding: 2px;">
                        <option value="matrix">Пресет: Матрица</option>
                        <option value="cyberpunk">Пресет: Киберпанк</option>
                        <option value="zerkalius">Пресет: Зеркалиус</option>
                        <option value="synthwave">Пресет: Synthwave</option>
                        <option value="blood">Пресет: Blood</option>
                        <option value="mutation" style="background:#440044; color:#ff00ff;">🧬 Пресет: Мутация (История)</option>
                        <option value="crypto" style="background:#000000; color:#ff3333; font-weight:bold;">🌈 Пресет: Крипто-Хеш (Спектр)</option>
                    </select>
                    <div class="color-palette">
                        <div class="palette-row">
                            <span>Актив:</span>

        const MODULE_ALGORITHMS = {
            findDiagonals: function(visibleLines, visibleHeight) {
                if (visibleLines.length === 0) return [];
                const H = visibleHeight; let W = 0;
                for(let r=0; r<H; r++) if(visibleLines[r] && visibleLines[r].text.length > W) W = visibleLines[r].text.length;
                const boldMask = Array.from({length: H}, () => Array(W).fill(false));
                const validChars = ['0', '1'];
                for (let r = 0; r < H; r++) {
                    if (!visibleLines[r]) continue;
                    const text = visibleLines[r].text;
                    for (let c = 0; c < text.length; c++) {
                        const char = text[c]; if (!validChars.includes(char)) continue;
                        let len = 1; while (r + len < H && visibleLines[r+len] && c + len < visibleLines[r+len].text.length && visibleLines[r+len].text[c+len] === char) len++;
                        if (len > 1) for (let k = 0; k < len; k++) boldMask[r+k][c+k] = true;
                    }
                }
                for (let r = 0; r < H; r++) {
                    if (!visibleLines[r]) continue;
                    const text = visibleLines[r].text;
                    for (let c = 0; c < text.length; c++) {
                        const char = text[c]; if (!validChars.includes(char)) continue;
                        let len = 1; while (r + len < H && visibleLines[r+len] && c - len >= 0 && visibleLines[r+len].text[c-len] === char) len++;
                        if (len > 1) for (let k = 0; k < len; k++) boldMask[r+k][c-k] = true;
                    }
                }
                return boldMask;
            },
            checkSymmetry: function(shapeLines) {
                if (!shapeLines || shapeLines.length === 0) return "Пусто";
                let symCount = 0; let totalCount = 0;
                for(let line of shapeLines) {
                    let s = line.text.trim();
                    if(s.length === 0) continue;
                    let left = s.substring(0, Math.floor(s.length/2));
                    let right = s.substring(Math.ceil(s.length/2)).split('').reverse().join('');
                    totalCount += left.length;
                    for(let i=0; i<left.length; i++) if(left[i] === right[i]) symCount++;
                }
                if(totalCount === 0) return "N/A";
                let percent = Math.round((symCount / totalCount) * 100);
                return percent === 100 ? "Симметрия: 100% ⚖️" : `Асимметрия (${percent}%) 📐`;
            }
        };

        const MODULE_DATA = {
            normalizeLines: function(rawLines) {
                if (!Array.isArray(rawLines)) return [];
                return rawLines.map((item, index) => {
                    if (typeof item === 'string') return { text: item, color: '' };
                    else if (item && typeof item === 'object') return { text: item.text || '', color: item.color || '' };
                    return { text: '', color: '' };
                });
            },
            saveToLocalStorage: function(data) { try { localStorage.setItem('saved_binary_lines_v24', JSON.stringify(data)); } catch (e) {} },
            loadFromLocalStorage: function() {
                const saved = localStorage.getItem('saved_binary_lines_v24');
                if (saved) {
                    try {

                        if (Array.isArray(parsed) && parsed.length > 0) {

                            this.precalculateLines(true); UI.statusInfo.textContent = "Загружено из памяти"; return true;
                        }
                    } catch (e) {}
                }
                return false;
            },
            
            generateVacuum: function() {
                let h = 100; let w = 150;
                let matrix = [];
                for(let i=0; i<h; i++) {
                    let row = "";
                    for(let j=0; j<w; j++) row += (i % 2 === j % 2) ? '1' : '0';
                    matrix.push({text: row, color: ''});
                }
                MODULE_STATE.originalLines = matrix;
                this.saveToLocalStorage(MODULE_STATE.originalLines);
                this.precalculateLines(true);
            },

            generateSierpinski: function() {
                let seed = UI.zerkSeedInput.value.trim() || "1";
                let h = parseInt(UI.zerkCountInput.value, 10) || 100;
                let rule = UI.zerkRuleSelect.value;
                let matrix = [];
                
                if (rule === 'orbital') {
                    for(let y=0; y<h; y++) {
                        let len = 2 + y * 4; 
                        let rowStr = "";
                        for(let i=0; i<len; i++) rowStr += (i%2===0) ? '1' : '0';
                        matrix.push(rowStr.split(''));
                    }
                } else if (rule === 'diagonal') {
                    let w = seed.length + 2 * h; 
                    let numMatrix = Array.from({length: h}, () => Array(w).fill(0)); 
                    let centerStart = Math.floor((w - seed.length) / 2);
                    
                    for(let i=0; i<seed.length; i++) {
                        if(seed[i] === '1') {
                            for(let y=0; y<h; y++) { let x = centerStart + i + y; if(x < w) numMatrix[y][x]++; } 
                            for(let y=0; y<h; y++) { let x = centerStart + i - y; if(x >= 0) numMatrix[y][x]++; } 
                        }
                    }
                    
                    for(let y=0; y<h; y++) {
                        matrix[y] = [];
                        for(let x=0; x<w; x++) {
                            matrix[y][x] = (numMatrix[y][x] % 2 === 1) ? '1' : '0';
                        }
                    }
                } else {
                    let w = seed.length + 2 * h; 
                    matrix = Array.from({length: h}, () => Array(w).fill('0')); 
                    let centerStart = Math.floor((w - seed.length) / 2);
                    
                    if (rule === 'vortex') {
                        for (let y = 0; y < h; y++) {
                            for (let x = centerStart - y; x <= centerStart + y + seed.length - 1; x++) {
                                if (Math.abs(x - centerStart + y) % 3 === 0) matrix[y][x] = '0'; else matrix[y][x] = '1';
                            }
                        }
                    } else if (rule === 'ziggurat') {
                        for(let y=0; y<h; y++) {
                            let bgChar = y % 2 === 0 ? '1' : '0';
                            matrix[y].fill(bgChar);
                        }

                        if (hideStatic && !isChanged && !isCollision) cAlpha = 0.0;
                        if (cAlpha <= 0.01) continue; 

                        let rgbaStr = `rgba(${cRgb}, ${cAlpha})`;
                        if (11 > fontSize) charShadowBlur = 0; 
                        
                        if (lastFillStyle !== rgbaStr) { ctx.fillStyle = rgbaStr; lastFillStyle = rgbaStr; }
                        if (lastShadowBlur !== charShadowBlur) { ctx.shadowBlur = charShadowBlur; lastShadowBlur = charShadowBlur; }
                        if (charShadowBlur > 0) { 
                            let hexC = (activeTheme === 'mutation' && lineData.mutFlags && lineData.mutFlags[actualIdx] > 0) 
                                ? MUTATION_COLORS[(lineData.mutFlags[actualIdx] - 1) % MUTATION_COLORS.length] 
                                : (isRainbow && isExactMatch ? '#ff3333' : (isChanged?actColor:statColor)); 
                            if(lastShadowColor !== hexC) { ctx.shadowColor = hexC; lastShadowColor = hexC; } 
                        }
                        
                        ctx.fillText(finalChar, x, y);
                    }
                }
            }
        };

        const PLAYER = {
            start: function() {
                MODULE_STATE.isPlaying = true; MODULE_STATE.isPaused = false;
                UI.playBtn.innerHTML = '⏸'; UI.playBtn.style.background = '#ff3333'; UI.playBtn.style.color = '#fff';
                MODULE_STATE.lastTickTime = performance.now(); 
                
                const bgAudio = document.getElementById('bgAudio');
                if(AUDIO_VISUALIZER.isInit && bgAudio.src && bgAudio.paused) bgAudio.play();

                this.loop(performance.now());
            },
            pause: function() {
                MODULE_STATE.isPlaying = false; MODULE_STATE.isPaused = true;
                cancelAnimationFrame(MODULE_STATE.rafId);
                UI.playBtn.innerHTML = '▶'; UI.playBtn.style.background = '#ffcc00'; UI.playBtn.style.color = '#000';
                
                const bgAudio = document.getElementById('bgAudio');
                if(AUDIO_VISUALIZER.isInit && bgAudio.src && !bgAudio.paused) bgAudio.pause();
            },
            stop: function() {
                MODULE_STATE.isPlaying = false; MODULE_STATE.isPaused = false;
                cancelAnimationFrame(MODULE_STATE.rafId);
                MODULE_STATE.currentIndex = 0; MODULE_STATE.dualCoreIndex = 0; MODULE_STATE.algoPointer = 0; MODULE_STATE.globalAngle = 0;
                UI.playBtn.innerHTML = '▶'; UI.playBtn.style.background = '#00ff66'; UI.playBtn.style.color = '#000';
                
                const bgAudio = document.getElementById('bgAudio');
                if(AUDIO_VISUALIZER.isInit && bgAudio.src) { bgAudio.pause(); bgAudio.currentTime = 0; }

                RENDERER.updateTimeline(); RENDERER.renderFrame();
            },
            loop: function(timestamp) {
                if (!MODULE_STATE.isPlaying) return;
                
                const speedVal = parseInt(UI.speedRange?.value || 920, 10);
                const speedMs = 1001 - speedVal; 

                const delta = timestamp - MODULE_STATE.lastTickTime;
                
                if (delta < speedMs) {
                    if (AUDIO_VISUALIZER.isInit || UI.spin3dCheck?.checked || UI.breathingZoomCheck?.checked) {
                        MODULE_STATE.breathTime += 0.02; 
                        if (UI.spin3dCheck?.checked) MODULE_STATE.globalAngle += 0.5; 
                        RENDERER.renderFrame(); 
                    }
                }

                if (delta >= speedMs) {
                    MODULE_STATE.lastTickTime = timestamp - (delta % Math.max(1, speedMs)); 
                    
                    let multStep = parseInt(UI.speedMultInput?.value || 1, 10);
                    if (multStep < 1) multStep = 1;

                    for (let m = 0; m < multStep; m++) {
                        if (UI.autoPilotCheck?.checked && AUDIO_VISUALIZER.isInit) {
                            if (AUDIO_VISUALIZER.bassLevel < 30) MODULE_STATE.framesSinceChange++;
                            else MODULE_STATE.framesSinceChange = 0; 
                            if (MODULE_STATE.framesSinceChange > 60) {
                                SCENE_MANAGER.loadRandomScene(); 
                                MODULE_STATE.framesSinceChange = -100; 
                            }
                        }

                        let searchPat = UI.searchInput?.value?.trim();
                        if (searchPat && MODULE_STATE.originalLines.length > 0) {
                            let addedToLog = false;
                            MODULE_STATE.originalLines.forEach(l => {
                                if (l.text.includes(searchPat) && !MODULE_STATE.foundPatterns.has(l.text)) {
                                    MODULE_STATE.foundPatterns.add(l.text);
                                    UI.dataInput.value += l.text + "\n";
                                    addedToLog = true;
                                }
                            });
                            if (addedToLog) {
                                UI.dataInput.style.display = 'block';
                                UI.dataInput.scrollTop = UI.dataInput.scrollHeight;
                            }
                        }

                        if (UI.zerkaliusAnimCheck?.checked && MODULE_STATE.originalLines.length > 0) MODULE_DATA.runAnimatrixGlobal();

                        if (UI.echoModeCheck?.checked && MODULE_STATE.originalLines.length > 0) {
                            if (!MODULE_STATE.isReverse) {
                                MODULE_STATE.echoHistory.push(JSON.parse(JSON.stringify(MODULE_STATE.originalLines)));
                                if(MODULE_STATE.echoHistory.length > 300) MODULE_STATE.echoHistory.shift();
                                
                                let lines = MODULE_STATE.originalLines; let newLines = [];
                                for(let i=0; i<lines.length; i++) {
                                    let prev = (i > 0) ? lines[i-1].text : lines[lines.length-1].text;
                                    let curr = lines[i].text; let res = ""; let len = Math.max(curr.length, prev.length);
                                    for(let k=0; k<len; k++) {
                                        let c1 = curr[k] || ' '; let c2 = prev[k] || ' ';
                                        if (c1 === c2 && c1 !== ' ') res += ' ';
                                        else if (c1 !== ' ' && c2 === ' ') res += c1;
                                        else if (c2 !== ' ' && c1 === ' ') res += c2;
                                        else res += c1;
                                    }
                                    newLines.push({text: res, color: lines[i].color});
                                }
                                MODULE_STATE.originalLines = newLines; MODULE_DATA.precalculateLines(false);
                            } else {
                                if (MODULE_STATE.echoHistory.length > 0) { MODULE_STATE.originalLines = MODULE_STATE.echoHistory.pop(); MODULE_DATA.precalculateLines(false); }
                            }
                        }

                        if (UI.elkaCheck?.checked && MODULE_STATE.originalLines.length > 0) {
                            let dir = MODULE_STATE.isReverse ? -1 : 1;
                            let allChars = MODULE_STATE.originalLines.map(l => l.text).join('');
                            if (allChars.length > 0) {
                                if (dir > 0) allChars = allChars.substring(1) + allChars[0]; else allChars = allChars.slice(-1) + allChars.slice(0, -1);
                                let ptr = 0;
                                for (let i = 0; i < MODULE_STATE.originalLines.length; i++) {
                                    let len = MODULE_STATE.originalLines[i].text.length;
                                    MODULE_STATE.originalLines[i].text = allChars.substring(ptr, ptr + len); ptr += len;
                                }
                                MODULE_DATA.precalculateLines(false);
                            }
                        } 

                        const steps = this.getAlgorithmSteps();
                        let step = steps[MODULE_STATE.algoPointer % steps.length];
                        if (MODULE_STATE.isReverse) step = -step;
                        
                        if (UI.freezeScrollCheck && UI.freezeScrollCheck.checked) step = 0; 

                        MODULE_STATE.currentIndex = (MODULE_STATE.currentIndex + step + MODULE_STATE.lines.length) % MODULE_STATE.lines.length;
                        
                        if (UI.dualCoreCheck?.checked) {
                            let mult = parseInt(UI.dualCoreSpeedInput.value, 10) || 2;
                            MODULE_STATE.dualCoreIndex = (MODULE_STATE.dualCoreIndex + (step * mult) + MODULE_STATE.lines.length) % MODULE_STATE.lines.length;
                        }

                        MODULE_STATE.algoPointer++; 
                    }
                    RENDERER.renderFrame(); RENDERER.updateTimeline();
                }
                MODULE_STATE.rafId = requestAnimationFrame((ts) => this.loop(ts));
            },
            getAlgorithmSteps: function() {
                if(!UI.algorithmInput) return [1]; const val = UI.algorithmInput.value; const matches = val.match(/[+-]?\d+/g);
                if (matches) { const steps = matches.map(x => parseInt(x, 10)).filter(x => !isNaN(x)); if (steps.length > 0) return steps; }
                return [1];
            }
        };

        const EVENTS = {
            init: function() {
                SCENE_MANAGER.init();

                if(UI.audioLoader) UI.audioLoader.addEventListener('change', function(e) { const file = e.target.files[0]; if (!file) return; AUDIO_VISUALIZER.initFile(file); });
                if(UI.micBtn) UI.micBtn.addEventListener('click', () => AUDIO_VISUALIZER.initMic());

                if(UI.generateVacuumBtn) UI.generateVacuumBtn.addEventListener('click', () => { let implantState = UI.implantModeCheck.checked; UI.implantModeCheck.checked = false; MODULE_DATA.generateVacuum(); UI.implantModeCheck.checked = implantState; });
                
                if(UI.clearCanvasBtn) UI.clearCanvasBtn.addEventListener('click', () => { 
                    MODULE_STATE.originalLines = []; MODULE_STATE.lines = []; MODULE_STATE.echoHistory = []; MODULE_STATE.currentIndex = 0;
                    if (MODULE_STATE.isPlaying) PLAYER.stop();
                    UI.dataInput.value = ""; UI.dataInput.style.display = 'none'; MODULE_STATE.foundPatterns.clear();
                    RENDERER.updateTimeline(); RENDERER.renderFrame();
                    UI.statusInfo.textContent = "Холст мгновенно очищен"; MODULE_DATA.saveToLocalStorage([]);
                });

                if(UI.insertZerosGlobalBtn) UI.insertZerosGlobalBtn.addEventListener('click', () => {
                    if (MODULE_STATE.originalLines.length === 0) return;
                    MODULE_STATE.originalLines.forEach(line => {
                        let s = line.text; if(s.length > 0) { let mid = Math.floor(s.length / 2); if(s.length % 2 === 0) line.text = s.slice(0, mid) + '00' + s.slice(mid); else line.text = s.slice(0, mid) + '0' + s.slice(mid); }
                    }); MODULE_DATA.saveToLocalStorage(MODULE_STATE.originalLines); MODULE_DATA.precalculateLines(false);
                });

                if(UI.insertOnesGlobalBtn) UI.insertOnesGlobalBtn.addEventListener('click', () => {
                    if (MODULE_STATE.originalLines.length === 0) return;
                    MODULE_STATE.originalLines.forEach(line => {
                        let s = line.text; if(s.length > 0) { let mid = Math.floor(s.length / 2); if(s.length % 2 === 0) line.text = s.slice(0, mid) + '11' + s.slice(mid); else line.text = s.slice(0, mid) + '1' + s.slice(mid); }
                    }); MODULE_DATA.saveToLocalStorage(MODULE_STATE.originalLines); MODULE_DATA.precalculateLines(false);
                });

                if(UI.fill1010Btn) UI.fill1010Btn.addEventListener('click', () => {
                    if (MODULE_STATE.originalLines.length === 0) return;
                    MODULE_STATE.originalLines.forEach(line => {
                        let s = line.text; 
                        if(s.length > 0) { 
                            let res = ""; 
                            for(let i=0; i<s.length; i++) {
                                if(s[i] === ' ') res += ' '; 
                                else res += (i % 2 === 0) ? '1' : '0'; 
                            }
                            line.text = res; 
                        }
                    }); 
                    MODULE_DATA.saveToLocalStorage(MODULE_STATE.originalLines); MODULE_DATA.precalculateLines(false);
                });
                
                const setAlign = (mode, btn) => { MODULE_STATE.alignMode = mode; [UI.alignLeftBtn, UI.alignCenterBtn, UI.alignRightBtn].forEach(b => { b.style.background = '#0a1128'; b.style.color = '#00ccff'; b.style.boxShadow = 'none'; }); btn.style.background = '#00ccff'; btn.style.color = '#000'; btn.style.boxShadow = '0 0 8px rgba(0, 204, 255, 0.5)'; RENDERER.renderFrame(); };
                UI.alignLeftBtn.addEventListener('click', function() { setAlign('left', this); }); UI.alignCenterBtn.addEventListener('click', function() { setAlign('center', this); }); UI.alignRightBtn.addEventListener('click', function() { setAlign('right', this); });

                if(UI.canvas) {
                    UI.canvas.addEventListener('dblclick', function(e) { e.preventDefault(); document.body.classList.toggle('zen-mode'); MODULE_STATE.offsetX = 0; MODULE_STATE.offsetY = 0; setTimeout(() => RENDERER.renderFrame(), 50); });
                    UI.canvas.addEventListener('mousedown', function(e) { MODULE_STATE.isDragging = true; MODULE_STATE.hasMoved = false; MODULE_STATE.dragStartX = e.clientX; MODULE_STATE.dragStartY = e.clientY; MODULE_STATE.startOffsetX = MODULE_STATE.offsetX; MODULE_STATE.startOffsetY = MODULE_STATE.offsetY; });
                    UI.canvas.addEventListener('mousemove', function(e) { if (MODULE_STATE.isDragging) { const dx = e.clientX - MODULE_STATE.dragStartX; const dy = e.clientY - MODULE_STATE.dragStartY; if (Math.abs(dx) > 3 || Math.abs(dy) > 3) MODULE_STATE.hasMoved = true; MODULE_STATE.offsetX = MODULE_STATE.startOffsetX + dx; MODULE_STATE.offsetY = MODULE_STATE.startOffsetY + dy; RENDERER.renderFrame(); } });
                    window.addEventListener('mouseup', function(e) { MODULE_STATE.isDragging = false; });
                    UI.canvas.addEventListener('click', function(e) { if (!MODULE_STATE.hasMoved && MODULE_STATE.lines.length > 0) { if (MODULE_STATE.isPlaying) PLAYER.pause(); else PLAYER.start(); }});
                    UI.canvas.addEventListener('wheel', function(e) { if (MODULE_STATE.lines.length === 0) return; e.preventDefault(); if(UI.fontSizeRange) { let size = parseInt(UI.fontSizeRange.value, 10); if (0 > e.deltaY) size = Math.min(100, size + 1); else size = Math.max(1, size - 1);  UI.fontSizeRange.value = size; if(UI.fontSizeVal) UI.fontSizeVal.textContent = size + "px"; } RENDERER.renderFrame(); });
                }

                if(UI.themeSelect) { UI.themeSelect.addEventListener('change', function() { const t = THEMES[this.value]; if(t) { UI.activeColorPicker.value = t.act; UI.activeAlphaRange.value = t.actA; UI.staticColorPicker.value = t.stat; UI.staticAlphaRange.value = t.statA; RENDERER.renderFrame(); } }); }
                if(UI.toggleMenuBtn) { UI.toggleMenuBtn.addEventListener('click', function() { const panel = document.querySelector('.controls'); if (panel.style.display === 'none') { panel.style.display = 'flex'; this.style.background = '#00ff66'; } else { panel.style.display = 'none'; this.style.background = '#222'; } RENDERER.renderFrame(); }); }
                if(UI.toggleSideBtn) {
                    let currentLayout = 'left';
                    UI.toggleSideBtn.addEventListener('click', function() {
                        const container = document.querySelector('.main-layout'); const btns = [UI.toggleMenuBtn, UI.toggleSideBtn, UI.toggleCenterBtn, UI.toggleTrackBtn, UI.toggleReverseBtn, UI.toggleFrameBtn, UI.toggleRadarBtn]; const alignBtns = [UI.alignLeftBtn, UI.alignCenterBtn, UI.alignRightBtn];
                        if (currentLayout === 'left') { container.style.flexDirection = 'row-reverse'; currentLayout = 'right'; btns.forEach(b => { if(b) { b.style.left = 'auto'; b.style.right = '8px'; }}); alignBtns.forEach(b => { if(b) { b.style.right = 'auto'; b.style.left = '8px'; }}); } 
                        else { container.style.flexDirection = 'row'; currentLayout = 'left'; btns.forEach(b => { if(b) { b.style.right = 'auto'; b.style.left = '8px'; }}); alignBtns.forEach(b => { if(b) { b.style.left = 'auto'; b.style.right = '8px'; }}); } RENDERER.renderFrame();
                    });
                }

                if(UI.toggleCenterBtn) UI.toggleCenterBtn.addEventListener('click', function() { MODULE_STATE.isCenterActive = !MODULE_STATE.isCenterActive; if(MODULE_STATE.isCenterActive) { this.classList.add('active-yellow'); MODULE_STATE.isTrackRowActive = false; UI.toggleTrackBtn.classList.remove('active-red'); } else this.classList.remove('active-yellow'); RENDERER.renderFrame(); });
                if(UI.toggleFrameBtn) UI.toggleFrameBtn.addEventListener('click', function() { MODULE_STATE.isFrameActive = !MODULE_STATE.isFrameActive; if(MODULE_STATE.isFrameActive) this.classList.add('active-yellow'); else this.classList.remove('active-yellow'); RENDERER.renderFrame(); });
                if(UI.toggleRadarBtn) UI.toggleRadarBtn.addEventListener('click', function() { MODULE_STATE.isRadarActive = !MODULE_STATE.isRadarActive; if(MODULE_STATE.isRadarActive) { this.classList.add('active-yellow'); this.style.background = '#00ff66'; } else { this.classList.remove('active-yellow'); this.style.background = '#cc33ff'; MODULE_STATE.globalAngle = 0; } RENDERER.renderFrame(); });
                if(UI.toggleTrackBtn) UI.toggleTrackBtn.addEventListener('click', function() { MODULE_STATE.isTrackRowActive = !MODULE_STATE.isTrackRowActive; if(MODULE_STATE.isTrackRowActive) { this.classList.add('active-red'); MODULE_STATE.trackedRowIndex = MODULE_STATE.currentIndex; MODULE_STATE.isCenterActive = false; UI.toggleCenterBtn.classList.remove('active-yellow'); } else { this.classList.remove('active-red'); MODULE_STATE.trackedRowIndex = -1; } RENDERER.renderFrame(); });
                if(UI.toggleReverseBtn) UI.toggleReverseBtn.addEventListener('click', function() { MODULE_STATE.isReverse = !MODULE_STATE.isReverse; if(MODULE_STATE.isReverse) this.classList.add('active-green'); else this.classList.remove('active-green'); });
                if(UI.timelineRange) UI.timelineRange.addEventListener('input', (e) => { if (MODULE_STATE.isPlaying) PLAYER.stop(); MODULE_STATE.currentIndex = parseInt(e.target.value, 10); RENDERER.renderFrame(); });
                if(UI.prevBtn) UI.prevBtn.addEventListener('click', () => { if (MODULE_STATE.isPlaying) PLAYER.stop(); if (MODULE_STATE.lines.length > 0) { MODULE_STATE.currentIndex = (MODULE_STATE.currentIndex - 1 + MODULE_STATE.lines.length) % MODULE_STATE.lines.length; RENDERER.renderFrame(); RENDERER.updateTimeline(); }});
                if(UI.nextBtn) UI.nextBtn.addEventListener('click', () => { if (MODULE_STATE.isPlaying) PLAYER.stop(); if (MODULE_STATE.lines.length > 0) { MODULE_STATE.currentIndex = (MODULE_STATE.currentIndex + 1) % MODULE_STATE.lines.length; RENDERER.renderFrame(); RENDERER.updateTimeline(); }});
                if(UI.stopBtn) UI.stopBtn.addEventListener('click', () => PLAYER.stop());
                if(UI.playBtn) UI.playBtn.addEventListener('click', () => { if (MODULE_STATE.lines.length > 0) { if (MODULE_STATE.isPlaying) PLAYER.pause(); else PLAYER.start(); }});
                if(UI.exportExcelBtn) UI.exportExcelBtn.addEventListener('click', () => MODULE_DATA.exportToExcel());
                if(UI.exportBtn) UI.exportBtn.addEventListener('click', async () => { if (MODULE_STATE.originalLines.length === 0) return alert("Нет данных!"); const jsonStr = JSON.stringify(MODULE_STATE.originalLines, null, 2); const blob = new Blob([jsonStr], { type: "text/plain;charset=utf-8" }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Zerkalius_Data.txt"; link.click(); URL.revokeObjectURL(link.href); });
                
                if(UI.fileLoader) UI.fileLoader.addEventListener('change', function(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { MODULE_DATA.processTextData(e.target.result, file.name); }; reader.readAsText(file); });
                document.addEventListener('paste', function(e) { 
                    const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : ''; 
                    if (activeTag === 'input' || activeTag === 'textarea' || activeTag === 'select') return; 
                    let text = e.clipboardData.getData('text/plain'); 
                    if (text) { text = text.replace(/\t/g, ' '); MODULE_DATA.processTextData(text, 'Буфер обмена'); e.preventDefault(); if(!MODULE_STATE.isPlaying) RENDERER.renderFrame(); } 
                });
                
                if(UI.speedRange) { UI.speedRange.addEventListener('input', (e) => { const val = parseInt(e.target.value, 10); UI.speedVal.textContent = (1001 - val) + ' мс'; }); }
                if(UI.fontSizeRange) UI.fontSizeRange.addEventListener('input', (e) => { if(UI.fontSizeVal) UI.fontSizeVal.textContent = e.target.value + 'px'; RENDERER.renderFrame(); });
                if(UI.heightRange) UI.heightRange.addEventListener('input', (e) => { if(UI.heightVal) UI.heightVal.textContent = e.target.value; RENDERER.renderFrame(); });
                if(UI.lineHeightRange) UI.lineHeightRange.addEventListener('input', (e) => { if(UI.lineHeightVal) UI.lineHeightVal.textContent = e.target.value; RENDERER.renderFrame(); });
                if(UI.zerkaliusBtn) UI.zerkaliusBtn.addEventListener('click', () => MODULE_DATA.generateSierpinski());
                
                const rerenderEvents = [
                    UI.cylinderCheck, UI.elkaCheck, UI.hideStaticCheck, UI.deltaModeSelect, UI.neonGlowCheck, 
                    UI.findDiagonalsCheck, UI.logicalOpSelect, UI.dualCoreCheck, UI.dualCoreSpeedInput, UI.dualMaskCheck, UI.freezeLayer1Check,
                    UI.activeColorPicker, UI.activeAlphaRange, UI.staticColorPicker, UI.staticAlphaRange, UI.fontSelect, UI.freezeScrollCheck, UI.spin3dCheck, UI.breathingZoomCheck, UI.autoPilotCheck, UI.speedMultInput, UI.rainbowTextCheck
                ];
                rerenderEvents.forEach(el => { if(el) { el.addEventListener('change', () => RENDERER.renderFrame()); el.addEventListener('input', () => RENDERER.renderFrame()); }});
                window.addEventListener('resize', () => RENDERER.renderFrame());
            }
        };

        window.onload = function() { 
            EVENTS.init(); 
            const spVal = parseInt(UI.speedRange.value, 10); UI.speedVal.textContent = (1001 - spVal) + ' мс';
            if(!MODULE_DATA.loadFromLocalStorage()) {
                SCENE_MANAGER.loadScene("sourcecode", true); 
            }
        };
    </script>
