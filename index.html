<!--

PROJECT: Binary Drum Machine (Zerkalius: Genesis)
VERSION: Pro 18.0

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бинарный Вертикальный Барабан Pro 4.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        @font-face {
            font-family: 'Roboto Mono Local';
            src: url('RobotoMono-Regular.ttf') format('truetype'),
                 url('RobotoMono.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            background: #050505; 
            color: #00ff66; 
            font-family: 'Roboto Mono Local', 'Roboto Mono', monospace; 
            margin: 8px; 
            overflow: hidden;
            height: calc(100vh - 16px);
        }

        .main-layout {
            display: flex;
            gap: 12px;
            height: 100%;
            align-items: stretch;
            flex-direction: row; 
        }
        
        .controls { 
            width: 270px;
            min-width: 270px;
            display: flex; 
            flex-direction: column; 
            background: #101010; 
            padding: 6px; 
            border-radius: 4px; 
            border: 1px solid #222; 
            box-sizing: border-box;
            height: 100%;
        }

        .fixed-top {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-bottom: 2px solid #222;
            padding-bottom: 6px;
            margin-bottom: 4px;
        }

        .scrollable-settings {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 2px;
        }

        /* Кастомизация скроллбара */
        .scrollable-settings::-webkit-scrollbar { width: 6px; }
        .scrollable-settings::-webkit-scrollbar-track { background: #111; }
        .scrollable-settings::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .scrollable-settings::-webkit-scrollbar-thumb:hover { background: #555; }

        .fixed-player {
            flex-shrink: 0;
            background: #141414;
            border: 1px solid #222;
            border-radius: 4px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
            border-top: 2px solid #00ff66;
        }

        h3 { margin: 0 0 3px 0; color: #ffffff; text-shadow: 0 0 10px rgba(0,255,102,0.3); font-size: 14px; text-align: center; }
        h4 { margin: 5px 0 2px 0; color: #00ff66; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 2px; text-align: center; }
        
        textarea { display: none; }
        
        .player-buttons { display: flex; gap: 4px; width: 100%; }
        .player-buttons button { font-size: 12px; font-family: inherit; font-weight: bold; border: none; cursor: pointer; border-radius: 3px; padding: 6px 2px; }
        #playBtn { flex: 2; background: #00ff66; color: #000; }
        #playBtn:hover { background: #00cc52; }
        #stopBtn { flex: 1.2; background: #ff3333; color: #fff; }
        #stopBtn:hover { background: #cc0000; }
        #prevBtn, #nextBtn { flex: 1; background: #202020; color: #fff; border: 1px solid #333; }
        #prevBtn:hover, #nextBtn:hover { background: #303030; }

        .btn-file-ops { display: flex; flex-direction: column; gap: 4px; }
        .btn-danger { background: #ff3333; color: #fff; padding: 4px; font-size: 9px; border: none; border-radius: 3px; font-family: inherit; font-weight: bold; cursor: pointer; }
        .btn-danger:hover { background: #cc0000; }
        .btn-export { background: #00ccff; color: #000; font-size: 11px; font-weight: bold; border: none; border-radius: 3px; font-family: inherit; padding: 5px; cursor: pointer; }
        .btn-export:hover { background: #0099cc; color: #fff; }
        .btn-zerkalius { background: #ffcc00; color: #000; font-size: 12px; font-weight: bold; padding: 6px; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; margin-top: 5px; }
        .btn-zerkalius:hover { background: #e6b800; }

        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .btn-file { display: block; text-align: center; background: #252525; color: #fff; border: 1px solid #3c3c3c; padding: 5px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-file:hover { background: #353535; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }

        .control-group { display: flex; flex-direction: column; gap: 2px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; }
        .control-group-highlight { background: #141414; padding: 6px; border-radius: 3px; border: 1px solid #222; }
        .control-group:last-of-type { border-bottom: none; }

        label { font-size: 11px; display: flex; justify-content: space-between; align-items: center; user-select: none; color: #888; }
        label span { color: #00ff66; font-weight: bold; }
        
        .compact-row { display: flex; gap: 8px; justify-content: space-between; align-items: center; }
        .compact-row label { flex: 1; }

        .checkbox-row { display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin-bottom: 4px; cursor: pointer; }
        .checkbox-row input { margin: 0; cursor: pointer; }
        .checkbox-row span { color: #aaa; font-weight: normal; font-size: 11px; }
        .checkbox-row:hover span { color: #fff; }

        .radio-group { display: flex; gap: 12px; margin-top: 2px; background: #151515; padding: 6px; border-radius: 3px; justify-content: center; }
        .radio-item { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .reverse-container { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin: 2px 0; }

        input[type="range"] { width: 100%; cursor: pointer; margin-top: 1px; }
        input[type="text"] { background: #151515; color: #fff; border: 1px solid #333; padding: 3px; border-radius: 3px; font-family: inherit; font-size: 10px; outline: none; }
        input[type="text"]:focus { border-color: #00ff66; }
        input[type="checkbox"] { cursor: pointer; width: 13px; height: 13px; margin: 0; }
        input[type="radio"] { cursor: pointer; width: 12px; height: 12px; margin: 0; }
        input[type="color"] { border: none; width: 28px; height: 16px; padding: 0; background: none; cursor: pointer; }
        select { background: #222; color: #fff; border: 1px solid #444; padding: 2px; border-radius: 3px; width: 100%; font-family: inherit; font-size: 10px; outline: none; }
        
        #statusInfo { font-size: 10px; color: #ffcc00; text-align: center; margin-top: 1px; min-height: 11px; }

        #screenContainer { flex-grow: 1; background: #000000; border: 2px solid #111; border-radius: 5px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #screenCanvas { display: block; cursor: crosshair; } 
        #screenCanvas:active { cursor: grabbing; }
        
        #toggleMenuBtn, #toggleSideBtn { position: absolute; left: 6px; z-index: 10; border: none; color: #000; padding: 4px 8px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 12px; }
        #toggleMenuBtn { top: 6px; background: #00ff66; box-shadow: 0 0 8px rgba(0, 255, 102, 0.5); }
        #toggleSideBtn { top: 32px; background: #00ccff; box-shadow: 0 0 8px rgba(0, 204, 255, 0.5); }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="controls" id="leftPanel">
            
            <div class="fixed-top">
                <h3>Панель Pro 4.5</h3>
                <div class="file-input-wrapper">
                    <span class="btn-file">Открыть файл</span>
                    <input type="file" id="fileLoader" accept=".txt">
                </div>
                <div class="file-input-wrapper">
                    <span class="btn-file">Загрузить папку Template</span>
                    <input type="file" id="folderLoader" webkitdirectory directory multiple>
                </div>
                <select id="templateSelect">
                    <option value="">-- Шаблоны не загружены --</option>
                </select>
                <button id="exportBtn" class="btn-export">Сохранить как...</button>
                <button id="resetMemoryBtn" class="btn-danger">Очистить память</button>
                <div id="statusInfo">Ожидание...</div>
            </div>

            <div class="scrollable-settings">
                <div class="control-group control-group-highlight" id="statsPanel">
                    <label class="checkbox-row" style="margin: 0; justify-content: space-between;">
                        <span>Анализ кадра (0/1):</span>
                        <input type="checkbox" id="calcStatsCheck" style="width: 12px; height: 12px;">
                    </label>
                    <div style="font-size: 11px; display: flex; justify-content: space-between; margin-top: 2px;">
                        <span>0: <b id="statZeros" style="color: #fff;">0</b></span>
                        <span>1: <b id="statOnes" style="color: #fff;">0</b></span>
                    </div>
                    <div style="font-size: 10px; text-align: center; margin-top: 2px; color: #888;" id="statBalance">
                        Баланс: Выключен
                    </div>
                </div>

                <div class="control-group">
                    <label>Выравнивание экрана:</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="alignRadio" value="left">Лев</label>
                        <label class="radio-item"><input type="radio" name="alignRadio" value="center" checked>Центр</label>
                        <label class="radio-item"><input type="radio" name="alignRadio" value="right">Прав</label>
                    </div>
                </div>

                <div class="control-group">
                    <label>Автоподгонка под окно:</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="autofitRadio" value="none">Откл</label>
                        <label class="radio-item"><input type="radio" name="autofitRadio" value="width">Шир</label>
                        <label class="radio-item"><input type="radio" name="autofitRadio" value="height">Выс</label>
                        <label class="radio-item"><input type="radio" name="autofitRadio" value="both" checked>Авто</label>
                    </div>
                </div>

                <div class="control-group">
                    <div class="compact-row" style="margin-bottom: 2px;">
                        <label class="checkbox-row"><input type="checkbox" id="gridCheck"><span>Включить сетку</span></label>
                        <label>Цвет: <input type="color" id="gridColorPicker" value="#222222"></label>
                    </div>
                    <div class="compact-row" style="margin-top: 2px;">
                        <label class="checkbox-row"><input type="checkbox" id="squareMatrixCheck"><span>Квадратная (H=W)</span></label>
                    </div>
                    <div class="compact-row">
                        <label>Шаг H:
                            <select id="gridStepHSelect" style="width: 50px;">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </label>
                        <label>Шаг V:
                            <select id="gridStepVSelect" style="width: 50px;">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="4">4</option>
                                <option value="8" selected>8</option>
                                <option value="16">16</option>
                            </select>
                        </label>
                    </div>
                </div>

                <!-- БЛОК НАСТРОЙКИ DELTA (Режимы и Цвета) -->
                <div class="control-group control-group-highlight">
                    <label class="checkbox-row" style="margin:0;"><input type="checkbox" id="hideStaticCheck"><span><b style="color:#ffcc00">Скрыть статику (Delta)</b></span></label>
                    <div style="margin-top: 4px;">
                        <label>Режим сравнения:</label>
                        <select id="deltaModeSelect" style="margin-top:2px;">
                            <option value="top">Вертикаль (Строго вверх ▲)</option>
                            <option value="leftDiag">Левая диагональ (↖)</option>
                            <option value="rightDiag">Правая диагональ (↗)</option>
                            <option value="serpinski" selected>Серпинский (Обе диагонали ↖↗)</option>
                        </select>
                    </div>
                    <div class="compact-row" style="margin-top: 4px;">
                        <label>Цвет ↖: <input type="color" id="deltaColorLeft" value="#ff3333"></label>
                        <label>Цвет ↗: <input type="color" id="deltaColorRight" value="#00ccff"></label>
                    </div>
                </div>

                <div class="control-group">
                    <label>Схема видимости (например, 12):</label>
                    <input type="text" id="visibilityPatternInput" value="0" placeholder="0 - Все, 1 - Красн, 2 - Черн" style="text-align: center;">
                </div>

                <div class="control-group">
                    <label>Логическая операция:</label>
                    <select id="logicalOpSelect">
                        <option value="original">Оригинал (Без изменений)</option>
                        <option value="not">Инверсия NOT (0 ⇄ 1)</option>
                        <option value="xor">Разница XOR (с предыд. строкой)</option>
                        <option value="reverse">Зеркало (Реверс строки)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Схема раскраски (Тема):</label>
                    <select id="themeSelect">
                        <option value="default">Стандартная (Панель / Excel)</option>
                        <option value="redwhite">Красная статика / Белый клик</option>
                        <option value="matrix">Матрица (Зеленый / Белый)</option>
                        <option value="cyberpunk">Киберпанк (Синий / Янтарный)</option>
                        <option value="zerkalius">Зеркалиус (Синий / Серый)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Маска колонок (например, 0011):</label>
                    <input type="text" id="maskInput" placeholder="Маска скрытия столбцов" style="text-align: center;">
                </div>

                <div class="control-group">
                    <label>Шрифт по умолчанию:</label>
                    <select id="fontSelect">
                        <option value="'Roboto Mono Local', 'Roboto Mono', monospace">Roboto Mono</option>
                        <option value="'Courier New', monospace">Courier New</option>
                        <option value="'Consolas', monospace">Consolas</option>
                        <option value="'Lucida Console', monospace">Lucida Console</option>
                        <option value="'Impact', sans-serif">Impact (Массивный)</option>
                    </select>
                </div>

                <div class="control-group">
                    <div class="compact-row" style="margin-bottom: 2px;">
                        <label class="checkbox-row"><input type="checkbox" id="zeroOneCheck"><span>Раздельная окраска 0 / 1</span></label>
                    </div>
                    <div class="compact-row">
                        <label>Цвет 0: <input type="color" id="colorZeroPicker" value="#333333"></label>
                        <label>Цвет 1: <input type="color" id="colorOnePicker" value="#00ff66"></label>
                    </div>
                </div>

                <div class="control-group">
                    <div class="compact-row">
                        <label>Цвет текста: <input type="color" id="textColorPicker" value="#00ff66"></label>
                        <label>Фон: <input type="color" id="bgColorPicker" value="#000000"></label>
                    </div>
                </div>

                <div class="control-group">
                    <label class="checkbox-row"><input type="checkbox" id="fontWeightCheck"><span>Жирный текст</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="altColorsCheck"><span>Радужная тема</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="findDiagonalsCheck"><span>Искать диагонали макросом</span></label>
                    
                    <div style="border-top: 1px solid #333; margin: 4px 0;"></div>
                    <label class="checkbox-row"><input type="checkbox" id="crosshairCheck"><span>Прицел (Радар мыши)</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="crtCheck"><span>Эффект старого ЭЛТ монитора</span></label>
                    <div style="border-top: 1px solid #333; margin: 4px 0;"></div>

                    <label class="checkbox-row"><input type="checkbox" id="highlightActiveRowCheck"><span>Рамка активной строки</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="centerActiveRowCheck"><span>Активная строка всегда в центре</span></label>
                    <label class="checkbox-row"><input type="checkbox" id="zerkaliusAnimCheck"><span>Аниматрица Зеркалиуса (VBA)</span></label>
                </div>

                <button id="zerkaliusBtn" class="btn-zerkalius" title="Мгновенно строит фрактал на 256 строк">Генератор Зеркалиус (x256)</button>
            </div>

            <div class="fixed-player">
                <div class="player-buttons">
                    <button id="prevBtn" title="Шаг назад">◀</button>
                    <button id="playBtn">Старт</button>
                    <button id="stopBtn" title="Стоп и сброс">■</button>
                    <button id="nextBtn" title="Шаг вперед">▶</button>
                </div>
                
                <div class="control-group" style="border: none; padding: 0;">
                    <label>Кадр (Таймлапс): <span id="timelineVal">0 / 0</span></label>
                    <input type="range" id="timelineRange" class="timeline-slider" min="0" max="0" value="0">
                </div>

                <div class="control-group" style="border: none; padding: 0;">
                    <div class="reverse-container">
                        <input type="checkbox" id="reverseCheck" style="width: 20px; height: 20px; cursor: pointer;">
                        <span style="font-weight: bold; color: #ffcc00; font-size: 11px; user-select: none;">Реверс (Вниз)</span>
                    </div>
                </div>

                <div class="control-group" style="border: none; padding: 0;">
                    <label>Алгоритм сдвига строк:</label>
                    <input type="text" id="algorithmInput" value="1" placeholder="например: 1, 1, 2, -3, 1" style="text-align: center;">
                </div>

                <div class="control-group" style="border: none; padding: 0;">
                    <label>Скорость: <span id="speedVal">80 мс</span></label>
                    <input type="range" id="speedRange" min="1" max="1000" value="80">
                </div>
                
                <div class="control-group" style="border: none; padding: 0;">
                    <label>Экран (строк): <span id="heightVal">15</span></label>
                    <input type="range" id="heightRange" min="1" max="1024" value="15">
                </div>

                <div class="control-group" style="border: none; padding: 0;">
                    <label>Масштаб / Шрифт: <span id="fontSizeVal">24px</span></label>
                    <input type="range" id="fontSizeRange" min="1" max="100" value="24" disabled style="opacity: 0.4;">
                </div>
                
                <div class="control-group" style="border: none; padding: 0;">
                    <label>Интервал строк: <span id="lineHeightVal">1.2</span></label>
                    <input type="range" id="lineHeightRange" min="0.8" max="3.0" step="0.1" value="1.2">
                </div>
            </div>
        </div>

        <div id="screenContainer">
            <button id="toggleMenuBtn" title="Скрыть/Показать панель">⚙</button>
            <button id="toggleSideBtn" title="Переместить панель (Влево/Вправо)">⇄</button>
            <canvas id="screenCanvas"></canvas>
        </div>
    </div>

    <textarea id="dataInput"></textarea>

    <!-- Скрипт (Без символов < для редактора) -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const canvas = document.getElementById('screenCanvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff3333';
                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText("Системный сбой JS:", 20, 20);
                ctx.fillText(`Текст: ${message}`, 20, 50);
                ctx.fillText(`Строка: ${lineno}:${colno}`, 20, 80);
            }
            return false;
        };

        const STATIC_TEMPLATES = [
            "template0.txt",
            "template1.txt",
            "01.txt",
            "1neo.txt",
            "Zerkalius_portalius.txt"
        ];

        const MODULE_STATE = {
            originalLines: [], 
            lines: [],         
            animationFrames: [], 
            currentIndex: 0,
            isPlaying: false,
            isPaused: false,   
            timerId: null,
            algoPointer: 0,
            templates: {},
            mouseX: -1,
            mouseY: -1
        };

        const UI = {
            playBtn: document.getElementById('playBtn'),
            stopBtn: document.getElementById('stopBtn'), 
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            dataInput: document.getElementById('dataInput'),
            fileLoader: document.getElementById('fileLoader'),
            folderLoader: document.getElementById('folderLoader'), 
            templateSelect: document.getElementById('templateSelect'),
            exportBtn: document.getElementById('exportBtn'),
            saveFilenameInput: document.getElementById('saveFilenameInput'),
            resetMemoryBtn: document.getElementById('resetMemoryBtn'),
            zerkaliusBtn: document.getElementById('zerkaliusBtn'), 
            zerkaliusAnimCheck: document.getElementById('zerkaliusAnimCheck'), 
            speedRange: document.getElementById('speedRange'),
            speedVal: document.getElementById('speedVal'),
            heightRange: document.getElementById('heightRange'),
            heightVal: document.getElementById('heightVal'),
            fontSizeRange: document.getElementById('fontSizeRange'),
            fontSizeVal: document.getElementById('fontSizeVal'),
            lineHeightRange: document.getElementById('lineHeightRange'),
            lineHeightVal: document.getElementById('lineHeightVal'),
            fontSelect: document.getElementById('fontSelect'),
            fontWeightCheck: document.getElementById('fontWeightCheck'),
            reverseCheck: document.getElementById('reverseCheck'),
            hideStaticCheck: document.getElementById('hideStaticCheck'),
            deltaModeSelect: document.getElementById('deltaModeSelect'), // Добавлено
            deltaColorLeft: document.getElementById('deltaColorLeft'),   // Добавлено
            deltaColorRight: document.getElementById('deltaColorRight'), // Добавлено
            altColorsCheck: document.getElementById('altColorsCheck'),
            findDiagonalsCheck: document.getElementById('findDiagonalsCheck'), 
            crosshairCheck: document.getElementById('crosshairCheck'), 
            crtCheck: document.getElementById('crtCheck'),             
            textColorPicker: document.getElementById('textColorPicker'),
            bgColorPicker: document.getElementById('bgColorPicker'),
            algorithmInput: document.getElementById('algorithmInput'),
            timelineRange: document.getElementById('timelineRange'),
            timelineVal: document.getElementById('timelineVal'),
            logicalOpSelect: document.getElementById('logicalOpSelect'),
            themeSelect: document.getElementById('themeSelect'),
            maskInput: document.getElementById('maskInput'),
            zeroOneCheck: document.getElementById('zeroOneCheck'),
            colorZeroPicker: document.getElementById('colorZeroPicker'),
            colorOnePicker: document.getElementById('colorOnePicker'),
            calcStatsCheck: document.getElementById('calcStatsCheck'),
            visibilityPatternInput: document.getElementById('visibilityPatternInput'), 
            toggleMenuBtn: document.getElementById('toggleMenuBtn'), 
            toggleSideBtn: document.getElementById('toggleSideBtn'), 
            highlightActiveRowCheck: document.getElementById('highlightActiveRowCheck'), 
            centerActiveRowCheck: document.getElementById('centerActiveRowCheck'), 
            statusInfo: document.getElementById('statusInfo'),
            statZeros: document.getElementById('statZeros'),
            statOnes: document.getElementById('statOnes'),
            statBalance: document.getElementById('statBalance'),
            screenContainer: document.getElementById('screenContainer'),
            canvas: document.getElementById('screenCanvas'),
            ctx: document.getElementById('screenCanvas').getContext('2d'),
            gridCheck: document.getElementById('gridCheck'),
            gridColorPicker: document.getElementById('gridColorPicker'),
            gridStepHSelect: document.getElementById('gridStepHSelect'),
            gridStepVSelect: document.getElementById('gridStepVSelect'),
            squareMatrixCheck: document.getElementById('squareMatrixCheck')
        };

        const MODULE_ALGORITHMS = {
            findDiagonals: function(visibleLines, visibleHeight) {
                if (visibleLines.length === 0) return [];
                const H = visibleHeight;
                const W = visibleLines[0].text.length;
                const boldMask = [];
                for (let r = 0; H !== r; r++) {
                    boldMask.push(new Array(W).fill(false));
                }

        const MODULE_DATA = {

            parseExcelStylesheets: function(doc) {
                const classMap = {};
                const styleTags = doc.querySelectorAll('style');
                styleTags.forEach(tag => {
                    let cssText = tag.textContent.replace(/<!--|-->/g, '');
                    const ruleRegex = /\.([a-zA-Z0-9_-]+)\s*\{([^}]+)\}/g;
                    let match;
                    while ((match = ruleRegex.exec(cssText)) !== null) {
                        const className = match[1].trim();
                        const propertiesText = match[2].trim();
                        const styles = {};
                        propertiesText.split(';').forEach(dec => {
                            const parts = dec.split(':');
                            if (parts.length === 2) {
                                styles[parts[0].trim().toLowerCase()] = parts[1].trim();
                            }
                        });
                        classMap[className] = styles;
                    }
                });
                return classMap;
            },
            extractExcelStyles: function(cell, classMap) {
                let color = "";
                let bold = false;
                let font = "";
                function applyDeclarations(styles) {
                    if (!styles) return;
                    if (styles['color']) color = styles['color'];
                    if (styles['font-family']) font = styles['font-family'];
                    if (styles['font-weight']) {
                        const val = styles['font-weight'];
                        if (val === 'bold' || parseInt(val, 10) >= 700) bold = true;
                    }
                }
                function parseStyleString(styleStr) {
                    if (!styleStr) return;
                    const styles = {};
                    styleStr.split(';').forEach(dec => {
                        const parts = dec.split(':');
                        if (parts.length === 2) styles[parts[0].trim().toLowerCase()] = parts[1].trim();
                    });
                    applyDeclarations(styles);
                }
                if (cell.className) {
                    cell.className.split(/\s+/).forEach(cls => {
                        if (classMap[cls]) applyDeclarations(classMap[cls]);
                    });
                }
                parseStyleString(cell.getAttribute('style'));
                cell.querySelectorAll('*').forEach(el => {
                    if (el.className) {
                        el.className.split(/\s+/).forEach(cls => {
                            if (classMap[cls]) applyDeclarations(classMap[cls]);
                        });
                    }
                    parseStyleString(el.getAttribute('style'));
                    if (el.tagName.toLowerCase() === 'font') {
                        const fontColor = el.getAttribute('color');
                        if (fontColor) color = fontColor;
                        const fontFace = el.getAttribute('face');
                        if (fontFace) font = fontFace;
                    }
                    const tag = el.tagName.toLowerCase();
                    if (tag === 'b' || tag === 'strong') bold = true;
                });
                const lowerColor = color.toLowerCase();
                if (lowerColor === 'windowtext' || lowerColor === '#000000' || lowerColor === 'rgb(0, 0, 0)' || lowerColor === 'black' || lowerColor === 'rgba(0, 0, 0, 0)') {
                    color = ""; 
                }
                return { color, bold, font };
            },
            runSingleZerkaliusStep: function(lines, selRow) {
                const H = lines.length;
                if (selRow >= H) return;
                let topRow = selRow;
                while (topRow > 0 && lines[topRow - 1].text !== "") {
                    topRow--;
                }
                let upCount = selRow - topRow;
                if (upCount > 0) {
                    for (let i = 1; upCount >= i; i++) {
                        let upRow = selRow - i;
                        let lowRow = selRow + i;
                        if (lowRow >= H) break;
                        let upStr = lines[upRow].text;
                        let lowStr = lines[lowRow].text;
                        if (lowStr === "" || upStr === "") break;
                        if (upStr.length % 2 !== lowStr.length % 2) break;
                        let diff = (lowStr.length - upStr.length) / 2;
                        let resStr = "";
                        if (diff > 0) {
                            for (let j = 0; lowStr.length !== j; j++) {
                                let cNew = "";
                                if (j >= diff && (diff + upStr.length) > j) {
                                    let cUp = upStr[j - diff];
                                    let cLow = lowStr[j];
                                    cNew = (cUp === '1' && cLow === '1') ? '0' : '1';
                                } else {
                                    cNew = lowStr[j];
                                }
                                resStr += cNew;
                            }
                        } else {
                            for (let k = 0; upStr.length !== k; k++) {
                                let cUp = upStr[k];
                                let k_low = k + diff;
                                let cNew = "";
                                if (k_low >= 0 && lowStr.length > k_low) {
                                    let cLow = lowStr[k_low];
                                    cNew = (cUp === '1' && cLow === '1') ? '0' : '1';
                                } else {
                                    cNew = cUp;
                                }
                                resStr += cNew;
                            }
                        }
                        lines[upRow].text = resStr;
                    }
                    let targetText = "";
                    for (let rCheck = topRow - 1; rCheck >= Math.max(0, topRow - 10); rCheck--) {
                        const lineData = lines[rCheck];
                        if (lineData && (lineData.color === 'rgb(255, 255, 0)' || lineData.color === 'yellow' || lineData.color === '#ffff00')) {
                            if (lineData.text !== "") {
                                targetText = lineData.text;
                                break;
                            }
                        }
                    }
                    if (targetText !== "") {
                        for (let rCheck = topRow; selRow >= rCheck; rCheck++) {
                            if (lines[rCheck] && lines[rCheck].text === targetText) {
                                PLAYER.pause();
                                UI.statusInfo.textContent = "Пауза: Желтый паттерн!";
                                break;
                            }
                        }
                    }
                }
            },
            precalculateZerkaliusFrames: function() {
                const H = MODULE_STATE.originalLines.length;
                if (H === 0) {
                    MODULE_STATE.animationFrames = [];
                    return;
                }
                const frames = [];
                let currentLinesState = JSON.parse(JSON.stringify(MODULE_STATE.originalLines));
                for (let f = 0; H !== f; f++) {
                    this.runSingleZerkaliusStep(currentLinesState, f);
                    const frameProcessed = [];
                    const op = UI.logicalOpSelect.value;
                    const mask = UI.maskInput.value.trim();
                    for (let i = 0; currentLinesState.length !== i; i++) {
                        const line = currentLinesState[i];
                        let text = line.text;
                        if (op === 'not') {
                            text = text.split('').map(char => (char === '0' ? '1' : (char === '1' ? '0' : char))).join('');
                        } else if (op === 'xor') {
                            if (i > 0) {
                                const prevText = currentLinesState[i - 1].text;
                                text = text.split('').map((char, charIdx) => {
                                    const prevChar = prevText[charIdx];
                                    if ((char === '0' || char === '1') && (prevChar === '0' || prevChar === '1')) {
                                        return char === prevChar ? '0' : '1';
                                    }
                                    return char;
                                }).join('');
                            }
                        } else if (op === 'reverse') {
                            text = text.split('').reverse().join('');
                        }
                        
                        const diffFlags = [];
                        const diffFlagsLeft = [];
                        const diffFlagsRight = [];
                        
                        const prevProcessedText = i > 0 ? frameProcessed[i - 1].text : "";
                        for (let charIdx = 0; text.length !== charIdx; charIdx++) {
                            const char = text[charIdx];
                            const prevCharTop = prevProcessedText ? prevProcessedText[charIdx] : undefined;
                            const prevCharLeft = prevProcessedText ? prevProcessedText[charIdx - 1] : undefined;
                            const prevCharRight = prevProcessedText ? prevProcessedText[charIdx + 1] : undefined;
                            
                            diffFlags.push(char !== prevCharTop);
                            diffFlagsLeft.push(char !== prevCharLeft);
                            diffFlagsRight.push(char !== prevCharRight);
                        }
                        
                        const maskFlags = [];
                        if (mask.length > 0) {
                            for (let charIdx = 0; text.length !== charIdx; charIdx++) {
                                maskFlags.push(mask[charIdx % mask.length] === '1');
                            }
                        }
                        frameProcessed.push({
                            text: text,
                            color: line.color,
                            bold: line.bold,
                            font: line.font,
                            diffFlags: diffFlags,
                            diffFlagsLeft: diffFlagsLeft,
                            diffFlagsRight: diffFlagsRight,
                            maskFlags: maskFlags
                        });
                    }
                    frames.push(frameProcessed);
                }
                MODULE_STATE.animationFrames = frames;
            },
            generateZerkalius: function() {
                let seed = "1";
                if (MODULE_STATE.originalLines.length > 0) {
                    seed = MODULE_STATE.originalLines[MODULE_STATE.originalLines.length - 1].text || "1";
                }
                const targetSize = 256;
                const newLines = [];
                newLines.push({ text: seed, color: '#00ff66', bold: true, font: '' });

                for (let i = 1; targetSize !== i; i++) {
                    let prev = newLines[i-1].text;
                    let current = prev[0]; 
                    for (let k = 0; prev.length - 1 !== k; k++) {
                        let a = prev[k];
                        let b = prev[k+1];
                        current += (a === '1' && b === '1') ? '0' : '1';
                    }
                    current += prev[prev.length - 1]; 
                    newLines.push({ text: current, color: '#00ff66', bold: true, font: '' });
                }
                MODULE_STATE.originalLines = newLines;
                this.saveToLocalStorage(MODULE_STATE.originalLines);

            precalculateLines: function(isFirstLoad = false) {

                    } else if (op === 'xor') {
                        if (i > 0) {

                            text = text.split('').map((char, charIdx) => {
                                const prevChar = prevText[charIdx];
                                if ((char === '0' || char === '1') && (prevChar === '0' || prevChar === '1')) {
                                    return char === prevChar ? '0' : '1';
                                }
                                return char;
                            }).join('');
                        }
                    } else if (op === 'reverse') {
                        text = text.split('').reverse().join('');
                    }
                    
                    const diffFlags = [];
                    const diffFlagsLeft = [];
                    const diffFlagsRight = [];
                    const prevProcessedText = i > 0 ? processed[i - 1].text : "";
                    
                    for (let charIdx = 0; text.length !== charIdx; charIdx++) {
                        const char = text[charIdx];
                        const prevCharTop = prevProcessedText ? prevProcessedText[charIdx] : undefined;
                        const prevCharLeft = prevProcessedText ? prevProcessedText[charIdx - 1] : undefined;
                        const prevCharRight = prevProcessedText ? prevProcessedText[charIdx + 1] : undefined;
                        
                        diffFlags.push(char !== prevCharTop);
                        diffFlagsLeft.push(char !== prevCharLeft);
                        diffFlagsRight.push(char !== prevCharRight);
                    }
                    
                    const maskFlags = [];
                    if (mask.length > 0) {
                        for (let charIdx = 0; text.length !== charIdx; charIdx++) {
                            maskFlags.push(mask[charIdx % mask.length] === '1');
                        }
                    }
                    processed.push({
                        text: text,
                        color: line.color,
                        bold: line.bold,
                        font: line.font,
                        diffFlags: diffFlags,
                        diffFlagsLeft: diffFlagsLeft,
                        diffFlagsRight: diffFlagsRight,

                this.precalculateZerkaliusFrames();

                    for (let i = 0; visibleHeight - 1 !== i; i++) {
                        if ((i + 1) % gridStepH === 0) {
                            const y_grid = startY + i * lineSpacing + lineSpacing / 2;
                            ctx.beginPath();
                            ctx.moveTo(gridStartX - charWidth / 2, y_grid);
                            ctx.lineTo(gridStartX + totalGridWidth - charWidth / 2, y_grid);
                            ctx.stroke();
                        }
                    }
                    const gridTopY = startY - lineSpacing / 2;
                    const gridBottomY = startY + (visibleHeight - 1) * lineSpacing + lineSpacing / 2;
                    for (let c = 0; maxTextLength - 1 !== c; c++) {
                        if ((c + 1) % gridStepV === 0) {
                            const x_grid = gridStartX + c * charWidth + charWidth / 2;
                            ctx.beginPath();
                            ctx.moveTo(x_grid, gridTopY);
                            ctx.lineTo(x_grid, gridBottomY);
                            ctx.stroke();
                        }
                    }
                    ctx.restore();
                }

                const highlightActiveRow = UI.highlightActiveRowCheck.checked;
                if (highlightActiveRow && maxTextLength > 0) {
                    let activeScreenIdx = 0;
                    if (UI.centerActiveRowCheck.checked) {
                        activeScreenIdx = Math.floor(visibleHeight / 2);
                    } else if (useZerkaliusAnim) {
                        activeScreenIdx = MODULE_STATE.currentIndex % visibleHeight;
                    }
                    const activeY = startY + activeScreenIdx * lineSpacing;
                    const activeTextLen = visibleLines[activeScreenIdx] ? visibleLines[activeScreenIdx].text.length : 0;
                    
                    if (activeTextLen > 0) {
                        const totalLineWidth = activeTextLen * charWidth;
                        let lineStartX = (width - totalLineWidth) / 2 + charWidth / 2; 
                        if (alignMode === 'left') lineStartX = margin + charWidth / 2;
                        else if (alignMode === 'right') lineStartX = width - totalLineWidth - margin + charWidth / 2;

                        ctx.save();
                        ctx.strokeStyle = '#ffcc00'; 
                        ctx.lineWidth = 1.5;
                        ctx.shadowColor = '#ffcc00';
                        ctx.shadowBlur = 4;
                        ctx.globalAlpha = 1.0;
                        const x_left = lineStartX - charWidth / 2 - 8;
                        const x_right = lineStartX + totalLineWidth - charWidth / 2 + 8;
                        const y_top = activeY - lineSpacing / 2 + 1;
                        const y_bottom = activeY + lineSpacing / 2 - 1;
                        ctx.beginPath();
                        ctx.moveTo(x_left, y_top);
                        ctx.lineTo(x_right, y_top);
                        ctx.moveTo(x_left, y_bottom);
                        ctx.lineTo(x_right, y_bottom);
                        ctx.stroke();
                        ctx.restore();
                    }
                }

                const complexRender = useZeroOneColors || findDiagonals || hideStatic;

                for (let i = 0; visibleHeight !== i; i++) {
                    const lineData = visibleLines[i];
                    const text = lineData.text || "";
                    if (text.length === 0) continue;
                    
                    const lineIndex = useZerkaliusAnim ? i : ((MODULE_STATE.currentIndex + i) % activeLinesSource.length);
                    let finalColor = lineData.color || (useAlt ? altColors[lineIndex % altColors.length] : defaultColor);
                    let finalFont = lineData.font || defaultFont;
                    let finalBold = lineData.bold || isBoldGlobal;
                    
                    const totalLineWidth = text.length * charWidth;
                    let textX = width / 2;
                    let ctxAlign = 'center';

                    if (alignMode === 'left') {
                        textX = margin;
                        ctxAlign = 'left';
                    } else if (alignMode === 'right') {
                        textX = width - margin;
                        ctxAlign = 'right';
                    }
                    
                    const y = startY + i * lineSpacing;

                    if (!complexRender && hideStatic === false) {
                        ctx.textAlign = ctxAlign;
                        ctx.font = `${finalBold ? 'bold' : 'normal'} ${fontSize}px ${finalFont}`;
                        ctx.fillStyle = finalColor;
                        ctx.globalAlpha = 1.0;
                        ctx.shadowColor = finalColor;
                        ctx.shadowBlur = (11 > fontSize) ? 0 : 4;
                        ctx.fillText(text, textX, y);
                    } 
                    else {
                        ctx.textAlign = 'center'; 
                        for (let charIdx = 0; text.length !== charIdx; charIdx++) {
                            const char = text[charIdx];
                            const x = startX + charIdx * charWidth;
                            
                            let isChanged = false;
                            let drawColor = finalColor;
                            
                            if (deltaMode === 'top') {
                                isChanged = lineData.diffFlags[charIdx];
                            } else if (deltaMode === 'leftDiag') {
                                isChanged = lineData.diffFlagsLeft[charIdx];
                                if (isChanged) drawColor = cLeft;
                            } else if (deltaMode === 'rightDiag') {
                                isChanged = lineData.diffFlagsRight[charIdx];
                                if (isChanged) drawColor = cRight;
                            } else if (deltaMode === 'serpinski') {
                                const leftChange = lineData.diffFlagsLeft[charIdx];
                                const rightChange = lineData.diffFlagsRight[charIdx];
                                isChanged = leftChange || rightChange;
                                if (leftChange && rightChange) drawColor = '#ffffff'; 
                                else if (leftChange) drawColor = cLeft;
                                else if (rightChange) drawColor = cRight;
                            }
                            
                            const isMaskShow = !hasMask || maskFlags[charIdx];
                            const isCharBold = finalBold || (findDiagonals && boldMask[i] && boldMask[i][charIdx]);
                            ctx.font = `${isCharBold ? 'bold' : 'normal'} ${fontSize}px ${finalFont}`;
                            
                            let charColor = drawColor;
                            let charOpacity = 1.0;
                            let shadowBlur = 4;
                            
                            if (useZeroOneColors && (!hideStatic || isChanged)) {
                                charColor = (char === '0') ? colorZero : (char === '1' ? colorOne : drawColor);
                            }
                            
                            if (activeTheme === 'redwhite') {
                                if (isChanged) { charColor = '#ffffff'; shadowBlur = 6; }
                                else { charColor = '#ff3333'; charOpacity = 0.2; shadowBlur = 0; }
                            } else if (activeTheme === 'matrix') {
                                if (isChanged) { charColor = '#ffffff'; shadowBlur = 6; }
                                else { charColor = '#004411'; charOpacity = 0.35; shadowBlur = 0; }
                            } else if (activeTheme === 'cyberpunk') {
                                if (isChanged) { charColor = '#ffcc00'; shadowBlur = 6; }
                                else { charColor = '#0033aa'; charOpacity = 0.3; shadowBlur = 0; }
                            } else if (activeTheme === 'zerkalius') { 
                                if (char === '1') { charColor = '#0066cc'; shadowBlur = 4; }
                                else { charColor = '#dcdcdc'; shadowBlur = 0; if (hideStatic && !isChanged) charOpacity = 0.12; }
                            } else {
                                if (!isChanged && hideStatic) { charOpacity = 0.12; shadowBlur = 0; }
                            }
                            
                            if (activeVisState === 1 && !isChanged) { charOpacity = 0.04; shadowBlur = 0; } 
                            else if (activeVisState === 2 && isChanged) { charOpacity = 0.04; shadowBlur = 0; }
                            if (!isMaskShow) { charOpacity = 0.04; shadowBlur = 0; }
                            if (11 > fontSize) shadowBlur = 0;
                            
                            ctx.fillStyle = charColor;
                            ctx.globalAlpha = charOpacity;
                            ctx.shadowColor = charColor;
                            ctx.shadowBlur = shadowBlur;
                            ctx.fillText(char, x, y);
                        }
                    }
                }

                if (drawCrosshair && MODULE_STATE.mouseX > 0 && MODULE_STATE.mouseY > 0) {
                    ctx.save();
                    ctx.strokeStyle = '#ff00ff';
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.5;
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.moveTo(0, MODULE_STATE.mouseY);
                    ctx.lineTo(width, MODULE_STATE.mouseY);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(MODULE_STATE.mouseX, 0);
                    ctx.lineTo(MODULE_STATE.mouseX, height);
                    ctx.stroke();
                    ctx.restore();
                }

                if (drawCrt) {
                    ctx.save();
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                    ctx.shadowBlur = 0;
                    for (let sy = 0; height > sy; sy += 3) {
                        ctx.fillRect(0, sy, width, 1);
                    }
                    ctx.restore();
                }

                MODULE_STATS.calculate();
            }
        };

        const PLAYER = {
            start: function() {
                MODULE_STATE.isPlaying = true;
                MODULE_STATE.isPaused = false;
                UI.playBtn.textContent = 'Пауза';
                UI.playBtn.style.background = '#ff3333';
                UI.playBtn.style.color = '#fff';
                this.runTick();
            },
            pause: function() {
                MODULE_STATE.isPlaying = false;
                MODULE_STATE.isPaused = true;
                clearTimeout(MODULE_STATE.timerId);
                UI.playBtn.textContent = 'Продолж';
                UI.playBtn.style.background = '#ffcc00';
                UI.playBtn.style.color = '#000';
            },
            stop: function() {
                MODULE_STATE.isPlaying = false;
                MODULE_STATE.isPaused = false;
                clearTimeout(MODULE_STATE.timerId);
                MODULE_STATE.currentIndex = 0;
                MODULE_STATE.algoPointer = 0;
                UI.playBtn.textContent = 'Старт';
                UI.playBtn.style.background = '#00ff66';
                UI.playBtn.style.color = '#000';
                RENDERER.updateTimeline();
                RENDERER.renderFrame();
            },
            runTick: function() {
                if (!MODULE_STATE.isPlaying) return;
                if (UI.zerkaliusAnimCheck.checked) {
                    MODULE_DATA.runSingleZerkaliusStep(MODULE_STATE.originalLines, MODULE_STATE.currentIndex);
                    MODULE_DATA.precalculateLines();
                }
                RENDERER.renderFrame();
                RENDERER.updateTimeline();
                const steps = this.getAlgorithmSteps();
                let step = steps[MODULE_STATE.algoPointer % steps.length];
                if (UI.reverseCheck.checked) step = -step;
                MODULE_STATE.currentIndex = (MODULE_STATE.currentIndex + step + MODULE_STATE.lines.length) % MODULE_STATE.lines.length;
                MODULE_STATE.algoPointer++;
                const stateTimerInterval = parseInt(UI.speedRange.value, 10);
                MODULE_STATE.timerId = setTimeout(() => this.runTick(), stateTimerInterval);
            },
            getAlgorithmSteps: function() {
                const val = UI.algorithmInput.value;
                const matches = val.match(/[+-]?\d+/g);
                if (matches) {
                    const steps = matches.map(x => parseInt(x, 10)).filter(x => !isNaN(x));
                    if (steps.length > 0) return steps;
                }
                return [1];
            }
        };

        const MODULE_FILES = {
            saveFileNative: async function(suggestedName, content) {
                if ('showSaveFilePicker' in window) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: suggestedName,
                            types: [{ description: 'Текстовый файл (*.txt)', accept: { 'text/plain': ['.txt'] } }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(content);
                        await writable.close();
                        return true;
                    } catch (e) { return false; }
                }
                return false; 
            },
            exportData: async function() {
                if (MODULE_STATE.originalLines.length === 0) {
                    alert("Нет данных для сохранения!");
                    return;
                }
                let filename = UI.saveFilenameInput.value.trim();
                if (!filename) filename = "1.txt";
                if (!filename.endsWith(".txt")) filename += ".txt";
                const jsonStr = JSON.stringify(MODULE_STATE.originalLines, null, 2);
                const success = await this.saveFileNative(filename, jsonStr);
                if (!success) {
                    const blob = new Blob([jsonStr], { type: "text/plain;charset=utf-8" });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = filename;
                    link.click();
                    URL.revokeObjectURL(link.href);
                    UI.statusInfo.textContent = "Скачан в загрузки";
                } else {
                    UI.statusInfo.textContent = "Сохранено!";
                }
            }
        };

        const EVENTS = {
            init: function() {
                UI.logicalOpSelect.addEventListener('change', () => MODULE_DATA.precalculateLines());
                UI.deltaModeSelect.addEventListener('change', () => RENDERER.renderFrame());
                UI.deltaColorLeft.addEventListener('input', () => RENDERER.renderFrame());
                UI.deltaColorRight.addEventListener('input', () => RENDERER.renderFrame());
                UI.themeSelect.addEventListener('change', () => RENDERER.renderFrame());
                UI.maskInput.addEventListener('input', () => MODULE_DATA.precalculateLines());
                UI.highlightActiveRowCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.centerActiveRowCheck.addEventListener('change', () => RENDERER.renderFrame());

                UI.canvas.addEventListener('click', function(e) {
                    if (MODULE_STATE.lines.length === 0) return;
                    if (!clickPossible) return;
                    if (MODULE_STATE.isPlaying) PLAYER.pause();
                    else PLAYER.start();
                });

                UI.canvas.addEventListener('mousemove', function(e) {
                    if (UI.crosshairCheck.checked) {
                        const rect = UI.canvas.getBoundingClientRect();
                        MODULE_STATE.mouseX = e.clientX - rect.left;
                        MODULE_STATE.mouseY = e.clientY - rect.top;
                        if (!MODULE_STATE.isPlaying) RENDERER.renderFrame();
                    }
                });
                UI.canvas.addEventListener('mouseleave', function() {
                    MODULE_STATE.mouseX = -1;
                    MODULE_STATE.mouseY = -1;
                    if (!MODULE_STATE.isPlaying) RENDERER.renderFrame();
                });

                UI.canvas.addEventListener('wheel', function(e) {
                    if (MODULE_STATE.lines.length === 0) return;
                    e.preventDefault(); 
                    let size = parseInt(UI.fontSizeRange.value, 10);
                    if (0 > e.deltaY) size = Math.min(100, size + 1); 
                    else size = Math.max(1, size - 1);  
                    UI.fontSizeRange.value = size;
                    UI.fontSizeVal.textContent = size + 'px';
                    const selectedAutofit = document.querySelector('input[name="autofitRadio"]:checked');
                    if (selectedAutofit && selectedAutofit.value !== 'none') {
                        document.querySelector('input[name="autofitRadio"][value="none"]').checked = true;
                        UI.fontSizeRange.disabled = false;
                        UI.fontSizeRange.style.opacity = '1.0';
                    }
                    RENDERER.renderFrame();
                });

                let isDragging = false;
                let dragStartY = 0;
                let dragStartX = 0;
                let clickPossible = true; 
                let startIndex = 0;
                let startIndexSize = 0;
                
                UI.canvas.addEventListener('mousedown', function(e) {
                    if (MODULE_STATE.lines.length === 0) return;
                    isDragging = true;
                    dragStartY = e.clientY;
                    dragStartX = e.clientX;
                    clickPossible = true; 
                    startIndex = MODULE_STATE.currentIndex;
                    startIndexSize = parseInt(UI.fontSizeRange.value, 10);
                });
                
                UI.canvas.addEventListener('mousemove', function(e) {
                    if (!isDragging) return;
                    const diffY = e.clientY - dragStartY;
                    const diffX = e.clientX - dragStartX;
                    if (Math.abs(diffY) > 5 || Math.abs(diffX) > 5) {
                        clickPossible = false;
                        if (MODULE_STATE.isPlaying) {
                            PLAYER.pause(); 
                        }
                    }
                    if (e.shiftKey) {
                        const scaleStep = Math.round(diffY / 10); 
                        let newSize = startIndexSize + scaleStep;
                        if (1 > newSize) newSize = 1;
                        if (newSize > 100) newSize = 100;
                        if (newSize !== parseInt(UI.fontSizeRange.value, 10)) {
                            UI.fontSizeRange.value = newSize;
                            UI.fontSizeVal.textContent = newSize + 'px';
                            RENDERER.renderFrame();
                        }
                        return;
                    }
                    const fontSize = parseInt(UI.fontSizeRange.value, 10);
                    const lh = parseFloat(UI.lineHeightRange.value);
                    const lineSpacing = fontSize * lh;
                    const linesScrolled = Math.round(diffY / lineSpacing);
                    let newIndex = (startIndex - linesScrolled) % MODULE_STATE.lines.length;
                    if (0 > newIndex) newIndex += MODULE_STATE.lines.length;
                    if (newIndex !== MODULE_STATE.currentIndex) {
                        MODULE_STATE.currentIndex = newIndex;
                        RENDERER.renderFrame();
                        RENDERER.updateTimeline();
                    }
                });
                
                window.addEventListener('mouseup', function() { isDragging = false; });

                UI.toggleMenuBtn.addEventListener('click', function() {
                    const panel = document.querySelector('.controls');
                    if (panel.style.display === 'none') {
                        panel.style.display = 'flex';
                        this.style.background = '#00ff66';
                    } else {
                        panel.style.display = 'none';
                        this.style.background = '#222';
                    }
                    RENDERER.renderFrame(); 
                });

                let currentLayout = 'left';
                UI.toggleSideBtn.addEventListener('click', function() {
                    const container = document.querySelector('.main-layout');
                    if (currentLayout === 'left') {
                        container.style.flexDirection = 'row-reverse';
                        currentLayout = 'right';
                        UI.toggleMenuBtn.style.left = 'auto';
                        UI.toggleMenuBtn.style.right = '6px';
                        UI.toggleSideBtn.style.left = 'auto';
                        UI.toggleSideBtn.style.right = '6px';
                    } else {
                        container.style.flexDirection = 'row';
                        currentLayout = 'left';
                        UI.toggleMenuBtn.style.right = 'auto';
                        UI.toggleMenuBtn.style.left = '6px';
                        UI.toggleSideBtn.style.right = 'auto';
                        UI.toggleSideBtn.style.left = '6px';
                    }
                    RENDERER.renderFrame();
                });

                document.querySelectorAll('input[name="alignRadio"]').forEach(radio => {
                    radio.addEventListener('change', () => RENDERER.renderFrame());
                });

                document.querySelectorAll('input[name="autofitRadio"]').forEach(radio => {
                    radio.addEventListener('change', function() {
                        UI.fontSizeRange.disabled = (this.value !== 'none');
                        if (this.value !== 'none') {
                            UI.fontSizeRange.style.opacity = '0.4';
                        } else {
                            UI.fontSizeRange.style.opacity = '1.0';
                        }
                        RENDERER.renderFrame();
                    });
                });

                UI.folderLoader.addEventListener('change', function(e) {
                    const files = e.target.files;
                    if (!files || files.length === 0) return;
                    UI.templateSelect.innerHTML = '<option value="">-- Выберите шаблон --</option>';
                    let loadedCount = 0;
                    for (let i = 0; files.length !== i; i++) {
                        const file = files[i];
                        if (file.name.endsWith('.txt')) {
                            const reader = new FileReader();
                            reader.onload = function(event) {
                                MODULE_STATE.templates[file.name] = event.target.result;
                                const opt = document.createElement('option');
                                opt.value = file.name;
                                opt.textContent = file.name;
                                UI.templateSelect.appendChild(opt);
                                loadedCount++;
                                UI.statusInfo.textContent = `Папка: Шаблонов ${loadedCount}`;
                            };
                            reader.readAsText(file);
                        }
                    }
                });

                UI.templateSelect.addEventListener('change', function() {
                    const fileName = this.value;
                    if (!fileName) return;
                    if (MODULE_STATE.templates[fileName]) {
                        MODULE_DATA.processTextData(MODULE_STATE.templates[fileName], fileName);
                    }
                });

                UI.timelineRange.addEventListener('input', (e) => {
                    if (MODULE_STATE.isPlaying) PLAYER.stop();
                    MODULE_STATE.currentIndex = parseInt(e.target.value, 10);
                    UI.timelineVal.textContent = `${MODULE_STATE.currentIndex + 1} / ${MODULE_STATE.lines.length}`;
                    RENDERER.renderFrame();
                });

                UI.prevBtn.addEventListener('click', () => {
                    if (MODULE_STATE.isPlaying) PLAYER.stop();
                    if (MODULE_STATE.lines.length === 0) return;
                    MODULE_STATE.currentIndex = (MODULE_STATE.currentIndex - 1 + MODULE_STATE.lines.length) % MODULE_STATE.lines.length;
                    RENDERER.renderFrame();
                    RENDERER.updateTimeline();
                });

                UI.nextBtn.addEventListener('click', () => {
                    if (MODULE_STATE.isPlaying) PLAYER.stop();
                    if (MODULE_STATE.lines.length === 0) return;
                    MODULE_STATE.currentIndex = (MODULE_STATE.currentIndex + 1) % MODULE_STATE.lines.length;
                    RENDERER.renderFrame();
                    RENDERER.updateTimeline();
                });

                UI.exportBtn.addEventListener('click', () => MODULE_FILES.exportData());

                UI.resetMemoryBtn.addEventListener('click', () => {
                    if (confirm("Вы действительно хотите очистить локальную память браузера?")) {
                        localStorage.removeItem('saved_binary_lines_v3');
                        UI.dataInput.value = "";
                        MODULE_STATE.originalLines = [];
                        MODULE_STATE.lines = [];
                        PLAYER.stop();
                        RENDERER.updateTimeline();
                        UI.statusInfo.textContent = "Ожидание...";
                        RENDERER.renderFrame();
                    }
                });

                UI.fileLoader.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        MODULE_DATA.processTextData(e.target.result, file.name);
                    };
                    reader.readAsText(file);
                });

                document.addEventListener('paste', function(e) {
                    const html = e.clipboardData.getData('text/html');
                    if (html) {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        const classMap = MODULE_DATA.parseExcelStylesheets(doc);
                        const rows = doc.querySelectorAll('tr');
                        const newLines = [];
                        rows.forEach(row => {
                            const cells = row.querySelectorAll('td');
                            if (cells.length > 0) {
                                let rowText = "";
                                let rowColor = "";
                                let rowBold = false;
                                let rowFont = "";
                                cells.forEach((cell, idx) => {
                                    rowText += cell.textContent.trim() + " ";
                                    if (idx === 0) {
                                        const styles = MODULE_DATA.extractExcelStyles(cell, classMap);
                                        rowColor = styles.color;
                                        rowBold = styles.bold;
                                        rowFont = styles.font;
                                    }
                                });
                                newLines.push({ text: rowText.trim(), color: rowColor, bold: rowBold, font: rowFont });
                            }
                        });
                        if (newLines.length > 0) {
                            MODULE_STATE.originalLines = MODULE_DATA.normalizeLines(newLines);
                            MODULE_DATA.saveToLocalStorage(MODULE_STATE.originalLines);
                            PLAYER.stop();
                            MODULE_STATE.currentIndex = 0;
                            MODULE_DATA.precalculateLines(true);
                            UI.statusInfo.textContent = `Импортировано: ${MODULE_STATE.lines.length} строк`;
                            e.preventDefault();
                            return;
                        }
                    }
                    const text = e.clipboardData.getData('text/plain');
                    if (text) {
                        MODULE_DATA.processTextData(text, 'Буфер обмена');
                        e.preventDefault();
                    }
                });

                UI.playBtn.addEventListener('click', () => {
                    if (MODULE_STATE.lines.length === 0) return;
                    if (MODULE_STATE.isPlaying) {
                        PLAYER.pause(); 
                    } else {
                        if (MODULE_STATE.isPaused) {
                            PLAYER.start();
                        } else {
                            MODULE_STATE.currentIndex = 0;
                            MODULE_STATE.algoPointer = 0;
                            PLAYER.start();
                        }
                    }
                });

                UI.stopBtn.addEventListener('click', () => {
                    PLAYER.stop();
                });

                UI.fontSizeRange.addEventListener('input', (e) => {
                    UI.fontSizeVal.textContent = e.target.value + 'px';
                    RENDERER.renderFrame();
                });

                UI.lineHeightRange.addEventListener('input', (e) => {
                    UI.lineHeightVal.textContent = e.target.value;
                    RENDERER.renderFrame();
                });

                UI.fontSelect.addEventListener('change', () => RENDERER.renderFrame());
                UI.fontWeightCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.reverseCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.hideStaticCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.crosshairCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.crtCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.altColorsCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.findDiagonalsCheck.addEventListener('change', () => RENDERER.renderFrame()); 
                UI.zeroOneCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.colorZeroPicker.addEventListener('input', () => RENDERER.renderFrame());
                UI.colorOnePicker.addEventListener('input', () => RENDERER.renderFrame());
                UI.textColorPicker.addEventListener('input', () => RENDERER.renderFrame());
                UI.bgColorPicker.addEventListener('input', (e) => { UI.screen.style.backgroundColor = e.target.value; });
                UI.calcStatsCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.gridCheck.addEventListener('change', () => RENDERER.renderFrame());
                UI.gridColorPicker.addEventListener('input', () => RENDERER.renderFrame());
                UI.gridStepHSelect.addEventListener('change', () => RENDERER.renderFrame());
                UI.gridStepVSelect.addEventListener('change', () => RENDERER.renderFrame());
                UI.squareMatrixCheck.addEventListener('change', () => RENDERER.renderFrame());
                
                UI.zerkaliusBtn.addEventListener('click', () => MODULE_DATA.generateZerkalius());
                UI.zerkaliusAnimCheck.addEventListener('change', () => RENDERER.renderFrame());

                UI.speedRange.addEventListener('input', (e) => {
                    UI.speedVal.textContent = e.target.value + ' мс';
                    if (MODULE_STATE.isPlaying) {
                        PLAYER.stop();
                        PLAYER.start();
                    }
                });

                UI.heightRange.addEventListener('input', (e) => {
                    UI.heightVal.textContent = e.target.value;
                    RENDERER.renderFrame();
                });

                window.addEventListener('resize', () => RENDERER.renderFrame());
            }
        };

        window.onload = function() {
            UI.templateSelect.innerHTML = '<option value="">-- Выберите шаблон --</option>';
            STATIC_TEMPLATES.forEach(file => {
                const opt = document.createElement('option');
                opt.value = file;
                opt.textContent = file;
                UI.templateSelect.appendChild(opt);
            });
            EVENTS.init();
            MODULE_DATA.loadFromLocalStorage();
        };
    </script>
</body>
</html>
