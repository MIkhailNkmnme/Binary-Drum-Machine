    <!-- ==================== ШЕЙДЕРЫ WEBGL ==================== -->
    <script id="v-shader" type="x-shader/x-vertex">
        attribute vec2 a_position; varying vec2 v_uv;
        void main() { v_uv = a_position * 0.5 + 0.5; v_uv.y = 1.0 - v_uv.y; gl_Position = vec4(a_position, 0.0, 1.0); }
    </script>

    <script id="f-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec2 v_uv;
        
        uniform sampler2D u_fontMap;    
        uniform sampler2D u_dataMap;    
        
        uniform vec2 u_resolution;      
        uniform vec2 u_gridSize;        
        uniform vec2 u_offset;          
        uniform vec2 u_layerOffset;     
        
        uniform vec3 u_colorAct;        
        uniform vec3 u_colorStat;       
        uniform float u_alphaAct;
        uniform float u_alphaStat;

        uniform float u_hideStatic;     
        uniform float u_glowIntensity;  
        
        uniform float u_isRadar;        
        uniform float u_angleOffset;    
        
        uniform float u_dualCore;
        uniform float u_dualMask;
        uniform float u_rainbow;
        uniform float u_theme;

        #define PI 3.14159265359

        vec3 hsl2rgb(vec3 c) {
            vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0, 0.0, 1.0);
            return c.z + c.y * (rgb-0.5)*(1.0-abs(2.0*c.z-1.0));
        }

        vec4 getCellInfo(vec2 cellPos, sampler2D tex, vec2 grid) {
            vec2 uv = vec2(cellPos.x / grid.x, mod(cellPos.y, grid.y) / grid.y);
            if (uv.x < 0.0 || uv.x >= 1.0 || uv.y < 0.0 || uv.y >= 1.0) return vec4(0.0);
            return texture2D(tex, uv);
        }

        void main() {
            vec2 pos = v_uv; vec2 cell; vec2 uvWithinCell;
            float rAngle = 0.0; float radius = 0.0;

            if (u_isRadar > 0.5) {
                vec2 center = vec2(0.5) - (u_offset.x / u_resolution); 
                vec2 delta = pos - center; delta.x *= u_resolution.x / u_resolution.y; 
                radius = length(delta) * 2.0; 
                rAngle = atan(delta.y, delta.x); 
                
                float rowIdx = radius * u_gridSize.y; 
                float colIdx = (((rAngle + u_angleOffset) / (2.0 * PI)) + 0.5) * u_gridSize.x;
                
                cell = floor(vec2(colIdx, rowIdx));
                cell.y += u_offset.y; 
                uvWithinCell = fract(vec2(colIdx, rowIdx));
                if (radius < 0.05) { gl_FragColor = vec4(0.0); return; }
            } else {

        let pixelData = null;

        const fontTex = gl.createTexture();
        function buildFontAtlas() {
            const tmpC = document.createElement('canvas'); tmpC.width=1024; tmpC.height=1024;
            const tmpCtx = tmpC.getContext('2d');
            tmpCtx.fillStyle='#000'; tmpCtx.fillRect(0,0,1024,1024);
            tmpCtx.fillStyle='#fff'; tmpCtx.font='bold 50px monospace'; tmpCtx.textAlign='center'; tmpCtx.textBaseline='middle';
            
            for(let i=0; i<256; i++) {
                let char = String.fromCharCode(i);
                if(i > 127) char = String.fromCharCode(i + 848); // Cyrillic
                let x = (i % 16) * 64 + 32; let y = Math.floor(i / 16) * 64 + 32;

        }

        function updateDataTexture() {
            if(!pixelData || pixelData.length !== STATE.COLS * STATE.ROWS * 4) pixelData = new Uint8Array(STATE.COLS * STATE.ROWS * 4);
            for(let y=0; y<STATE.ROWS; y++) {

        function hex2vec(hex) { return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255]; }

        function createEmptyMatrix(w, h) { let m=[]; for(let y=0;y<h;y++){ let r=[]; for(let x=0;x<w;x++) r.push({c:' ',a:0,m:0}); m.push(r); } return m; }

        function precalcAct(m) {
            for(let y=1; y<STATE.ROWS; y++) for(let x=0; x<STATE.COLS; x++) {
                if(m[y][x].c !== ' ' && m[y][x].c !== m[y-1][x].c) { m[y][x].a = 1; m[y][x].m++; }
            } return m;

        function processText(text) {
            let linesStr = text.split('\n').map(l => l.replace(/\t/g, ' ')).filter(l => l.trim().length > 0);
            
            if (UI.implantModeCheck.checked && STATE.lines.length > 0) {
                let shH = linesStr.length; let shW = Math.max(...linesStr.map(l=>l.length));
                let startY = Math.floor((STATE.ROWS - shH) / 2); let startX = Math.floor((STATE.COLS - shW) / 2);
                for(let i=0; i<shH; i++) {
                    if(startY+i >= 0 && startY+i < STATE.ROWS) {
                        let shStr = linesStr[i].padEnd(shW, ' ');
                        for(let k=0; k<shStr.length; k++) {

                        }

            } else {
                STATE.ROWS = linesStr.length; STATE.COLS = Math.max(...linesStr.map(l=>l.length));

                for(let y=0; y<STATE.ROWS; y++) for(let x=0; x<linesStr[y].length; x++) STATE.lines[y][x].c = linesStr[y][x];

            STATE.lines = precalcAct(STATE.lines); updateDataTexture();
        }

        function generateMatrix() {

            let w = seed.length + 2*h; STATE.COLS = w; STATE.ROWS = h;
            let m = createEmptyMatrix(w, h); let cx = Math.floor(w/2 - seed.length/2);

            if(rule === 'orbital') {
                for(let y=0; y<h; y++) { let len=2+y*4; for(let i=0; i<len; i++) m[y][i].c = (i%2===0)?'1':'0'; }
            } else if (rule === 'diagonal') {
                let nMat = Array.from({length: h}, () => Array(w).fill(0));
                for(let i=0; i<seed.length; i++) { if(seed[i] === '1') { for(let y=0; y<h; y++) { let x=cx+i+y; if(x<w) nMat[y][x]++; } for(let y=0; y<h; y++) { let x=cx+i-y; if(x>=0) nMat[y][x]++; } } }
                for(let y=0; y<h; y++) for(let x=0; x<w; x++) m[y][x].c = (nMat[y][x]%2===1)?'1':'0';

        // --- ДВИЖОК РЕНДЕРА (GPU LOOP) ---
        let lastFPS = performance.now(); let frames = 0;
        function renderLoop(time) {
            frames++; if(time - lastFPS >= 1000) { UI.fps.textContent=`FPS: ${frames} | GPU`; frames=0; lastFPS=time; }
            
            AUDIO.update();
            let zoom = 1.0; if(UI.breathingZoomCheck.checked) zoom = 1 + Math.sin(STATE.breathTime+=0.02)*0.4;
            if(UI.spin3dCheck.checked) STATE.globalAngle += 0.01;

            let canvasRows = (UI.canvas.height / fSize) / (STATE.audioScale * zoom);

            let renderRows = Math.max(STATE.ROWS, canvasRows);

            gl.uniform1f(unilocs.angle, STATE.globalAngle);
            gl.uniform1f(unilocs.dualC, UI.dualCoreCheck.checked ? 1.0 : 0.0);
            gl.uniform1f(unilocs.dualM, UI.dualMaskCheck.checked ? 1.0 : 0.0);
            gl.uniform1f(unilocs.rainbow, UI.rainbowTextCheck.checked ? 1.0 : 0.0);
            
            let themeId = THEMES[UI.themeSelect.value]?.id || 0;
            gl.uniform1f(unilocs.theme, themeId);

            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fontTex); gl.uniform1i(unilocs.fontM, 0);
            gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, dataTex); gl.uniform1i(unilocs.dataM, 1);

            gl.drawArrays(gl.TRIANGLES, 0, 6);

            // ЛОГИКА СДВИГА (Математика)
            if(STATE.isPlaying) {
                let spd = parseInt(UI.speedRange.value, 10);
                if(time - STATE.lastTickTime >= (1001 - spd)) {
                    STATE.lastTickTime = time;
                    let m = parseInt(UI.speedMultInput.value, 10) || 1;
                    
                    if(UI.autoPilotCheck.checked && AUDIO.init) {
                        if(STATE.bassLevel < 30) STATE.framesSinceChange++; else STATE.framesSinceChange=0;
                        if(STATE.framesSinceChange > 60) { SCENE_MANAGER.loadRandomScene(); STATE.framesSinceChange = -100; }
                    }

                    if(UI.zerkaliusAnimCheck.checked && STATE.lines.length > 0) {
                        if(STATE.animatrixRow >= STATE.ROWS - 1) STATE.animatrixRow = 0;
                        let r1 = STATE.animatrixRow; let r2 = r1 + 1;
                        for(let x=0; x<STATE.COLS; x++) {
                            let c1 = STATE.lines[r1][x].c, c2 = STATE.lines[r2][x].c;
                            if(c1 !== ' ') {
                                if(c1===c2) STATE.lines[r2][x].c = ' '; else STATE.lines[r2][x].c = c1;
                                STATE.lines[r2][x].mut++; STATE.lines[r2][x].act = 1;
                            }
                        }
                        STATE.animatrixRow++;
                    }

                    if(UI.echoModeCheck.checked && !STATE.isReverse) {
                        let snapshot = STATE.lines.map(row => row.map(cell => ({...cell}))); STATE.echoHistory.push(snapshot);
                        if(STATE.echoHistory.length > 200) STATE.echoHistory.shift();
                        for(let y=1; y<STATE.ROWS; y++) {
                            for(let x=0; x<STATE.COLS; x++) {
                                let c1 = STATE.lines[y-1][x].c, c2 = STATE.lines[y][x].c;
                                if(c1 !== ' ') { STATE.lines[y][x].c = (c1===c2) ? ' ' : c1; STATE.lines[y][x].act = 1; STATE.lines[y][x].mut++; }
                            }
                        }
                    }

                    let pat = UI.searchInput.value.trim();
                    if(pat) {
                        STATE.lines.forEach(r => {
                            let s = r.map(c=>c.c).join('');
                            if(s.includes(pat) && !STATE.foundPatterns.has(s)) { STATE.foundPatterns.add(s); UI.dataInput.value += s+'\n'; UI.dataInput.style.display='block'; UI.dataInput.scrollTop=UI.dataInput.scrollHeight; }
                        });
                    }

                    let alg = parseInt(UI.algorithmInput.value, 10) || 1;
                    if(UI.freezeScrollCheck.checked) alg = 0;
                    let step = STATE.isReverse ? -alg : alg;
                    
                    STATE.offsetMatY -= (step / STATE.ROWS) * m;
                    if(UI.dualCoreCheck.checked) {
                        let dSpd = parseInt(UI.dualCoreSpeedInput.value,10)||2;
                        if(!UI.freezeLayer1Check.checked) STATE.layer2Y -= (step * dSpd / STATE.ROWS) * m;
                        else STATE.layer2Y -= (step / STATE.ROWS) * m;
                    }

                    updateDataTexture();
                }
            }

            requestAnimationFrame(renderLoop);
        }

        // --- СОБЫТИЯ ---
        SCENE_MANAGER.init();
        window.addEventListener('resize', () => { UI.canvas.width = UI.canvas.parentElement.clientWidth; UI.canvas.height = UI.canvas.parentElement.clientHeight; });
        UI.zerkaliusBtn.addEventListener('click', generateMatrix);
        UI.playBtn.addEventListener('click', () => { STATE.isPlaying = !STATE.isPlaying; UI.playBtn.innerHTML = STATE.isPlaying ? '⏸' : '▶'; if(AUDIO.init && document.getElementById('bgAudio').src) STATE.isPlaying ? document.getElementById('bgAudio').play() : document.getElementById('bgAudio').pause();});
        UI.toggleRadarBtn.addEventListener('click', () => { STATE.isRadar = !STATE.isRadar; UI.toggleRadarBtn.classList.toggle('active-yellow'); });
        UI.micBtn.addEventListener('click', () => AUDIO.setupMic());
        UI.audioLoader.addEventListener('change', (e) => AUDIO.setupFile(e.target.files[0]));
        UI.clearCanvasBtn.addEventListener('click', () => { STATE.lines = createEmptyMatrix(STATE.COLS, STATE.ROWS); updateDataTexture(); });
        UI.generateVacuumBtn.addEventListener('click', () => { STATE.COLS=150; STATE.ROWS=250; let m=[]; for(let y=0;y<250;y++){let r=[]; for(let x=0;x<150;x++) r.push({c:(y%2===x%2)?'1':'0',act:0,mut:0}); m.push(r);} STATE.lines=m; updateDataTexture(); });
        
        UI.canvas.addEventListener('mousedown', (e) => { STATE.isDragging=true; STATE.dragStartX=e.clientX; STATE.startOffsetX=STATE.offsetX; });
        UI.canvas.addEventListener('mousemove', (e) => { if(STATE.isDragging) STATE.offsetX = STATE.startOffsetX + (e.clientX - STATE.dragStartX); });
        window.addEventListener('mouseup', () => STATE.isDragging=false);
        UI.canvas.addEventListener('dblclick', () => document.body.classList.toggle('zen-mode'));

        document.addEventListener('paste', (e) => { 
            const t = e.target.tagName.toLowerCase(); if(t==='input'||t==='textarea') return; 
            let text = e.clipboardData.getData('text/plain'); if(text) { processText(text); e.preventDefault(); }
        });

        UI.themeSelect.addEventListener('change', function() { 
            const t = THEMES[this.value]; if(t) { UI.activeColorPicker.value = t.act; UI.staticColorPicker.value = t.stat; UI.activeAlphaRange.value = t.actA; UI.staticAlphaRange.value = t.statA; }
        });

        // HOTKEYS
        const showHotkeyInd = (text) => { UI.hotkeyInd.textContent = text; UI.hotkeyInd.style.opacity = 1; clearTimeout(STATE.hotkeyTimeout); STATE.hotkeyTimeout = setTimeout(() => UI.hotkeyInd.style.opacity = 0, 800); };
        document.addEventListener('keydown', function(e) {
            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : ''; if (activeTag === 'input' || activeTag === 'textarea' || activeTag === 'select') return;
            if (e.code === 'Space') { e.preventDefault(); UI.playBtn.click(); showHotkeyInd(STATE.isPlaying ? '▶ PLAY' : '⏸ PAUSE'); }
            if (e.key === 'w' || e.key === 'W' || e.key === 'ц') { let v = parseInt(UI.speedRange.value, 10); v = Math.min(1000, v + 10); UI.speedRange.value = v; UI.speedVal.textContent = (1001 - v) + ' мс'; showHotkeyInd(`Скорость: ${1001-v} мс`); }
            if (e.key === 's' || e.key === 'S' || e.key === 'ы') { let v = parseInt(UI.speedRange.value, 10); v = Math.max(1, v - 10); UI.speedRange.value = v; UI.speedVal.textContent = (1001 - v) + ' мс'; showHotkeyInd(`Скорость: ${1001-v} мс`); }
            if (e.key === '=' || e.key === '+') { let s = parseInt(UI.fontSizeRange.value, 10); s = Math.min(100, s + 1); UI.fontSizeRange.value = s; showHotkeyInd(`Масштаб: ${s}px`); }
            if (e.key === '-' || e.key === '_') { let s = parseInt(UI.fontSizeRange.value, 10); s = Math.max(1, s - 1); UI.fontSizeRange.value = s; showHotkeyInd(`Масштаб: ${s}px`); }
            if (e.key === 'd' || e.key === 'D' || e.key === 'в') { let m = parseInt(UI.speedMultInput.value, 10); m = Math.min(100, m + 1); UI.speedMultInput.value = m; showHotkeyInd(`Турбо: x${m}`); }
            if (e.key === 'a' || e.key === 'A' || e.key === 'ф') { let m = parseInt(UI.speedMultInput.value, 10); m = Math.max(1, m - 1); UI.speedMultInput.value = m; showHotkeyInd(`Турбо: x${m}`); }
            if (e.key === 'c' || e.key === 'C' || e.key === 'с') { UI.clearCanvasBtn.click(); showHotkeyInd('🧽 Очищено'); }
        });

        // ПЛАВАЮЩАЯ ПАНЕЛЬ
        const panel = document.getElementById('leftPanel'); let startX, startY, startLeft, startTop;
        UI.toggleFloatPanelBtn.addEventListener('click', function() {
            STATE.isPanelFloating = !STATE.isPanelFloating;
            if(STATE.isPanelFloating) { panel.classList.add('floating'); this.style.background = '#00ff66'; this.style.color = '#000'; panel.style.left = '50px'; panel.style.top = '10px'; } 
            else { panel.classList.remove('floating'); this.style.background = '#0088ff'; this.style.color = '#fff'; panel.style.left = ''; panel.style.top = ''; panel.style.transform = ''; }
        });
        panel.addEventListener('mousedown', function(e) { if(!STATE.isPanelFloating) return; if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON' || e.target.closest('.scrollable-settings') || e.target.closest('.fixed-player')) return; STATE.isDraggingPanel = true; startX = e.clientX; startY = e.clientY; startLeft = panel.offsetLeft; startTop = panel.offsetTop; });
        window.addEventListener('mousemove', function(e) { if(STATE.isDraggingPanel) { panel.style.left = (startLeft + e.clientX - startX) + 'px'; panel.style.top = (startTop + e.clientY - startY) + 'px'; } });
        window.addEventListener('mouseup', function() { STATE.isDraggingPanel = false; });

        window.onload = () => { 
            window.dispatchEvent(new Event('resize')); 
            let codeLines = document.documentElement.innerHTML.split('\n').map(l => l.trim()).filter(l => l.length > 0).slice(0, 350).join('\n');
            processText(codeLines);
            requestAnimationFrame(renderLoop);
        };
    </script>
</body>
</html>
